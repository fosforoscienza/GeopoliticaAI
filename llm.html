<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LLM Map — Geopolitica della AI</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    html, body { background: #040e1a !important; overflow: hidden; height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: center;
      padding: 0 clamp(24px, 4vw, 64px);
    }

    .llm-eyebrow {
      font-size: clamp(11px, 0.85vw, 14px);
      font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      margin-bottom: clamp(8px, 1.1vh, 14px);
    }
    .llm-heading {
      font-size: clamp(22px, 2.8vw, 48px);
      font-weight: 900; letter-spacing: -0.03em; line-height: 0.95;
      color: #fff; text-transform: uppercase;
      margin: 0 0 clamp(18px, 2.4vh, 36px);
    }
    .llm-heading em { color: #41b7ff; font-style: normal; }

    .llm-regions {
      display: grid;
      grid-template-columns: 3fr 1.1fr 2fr;
      gap: clamp(18px, 2.2vw, 40px);
      width: 100%; max-width: 1380px;
      align-items: start;
    }

    .region-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: clamp(9px, 1.1vh, 14px);
      padding-bottom: clamp(7px, 0.9vh, 11px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .region-flag { font-size: clamp(15px, 1.4vw, 20px); line-height: 1; }
    .region-name {
      font-size: clamp(10px, 0.76vw, 13px); font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.32);
    }
    .region-count {
      margin-left: auto;
      font-size: clamp(10px, 0.72vw, 12px);
      color: rgba(255,255,255,0.16);
      font-family: ui-monospace, monospace;
    }

    .region-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(7px, 0.68vw, 11px);
    }
    .region-eu .region-cards,
    .region-cn .region-cards { grid-template-columns: 1fr; }

    .llm-card {
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      border-top: 2px solid var(--brand);
      padding: clamp(9px, 1vh, 14px) clamp(9px, 0.9vw, 13px);
      display: flex; flex-direction: column; gap: 5px;
      animation: card-in 0.5s calc(var(--i,0) * 55ms) cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes card-in {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .llm-badge {
      width: clamp(26px, 2.5vw, 38px);
      height: clamp(26px, 2.5vw, 38px);
      border-radius: 7px;
      background: var(--badge-bg, var(--brand));
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(11px, 1.2vw, 18px);
      font-weight: 900; letter-spacing: -0.02em;
      color: var(--badge-fg, #fff);
      margin-bottom: 4px; flex-shrink: 0;
    }
    .llm-badge svg { width: 62%; height: 62%; display: block; overflow: visible; }

    .llm-company {
      font-size: clamp(11px, 0.92vw, 15px);
      font-weight: 700; line-height: 1.2; color: #e2e8f0;
    }
    .llm-model {
      font-size: clamp(9px, 0.72vw, 12px);
      font-weight: 500; opacity: 0.82;
      color: var(--brand); letter-spacing: 0.01em; line-height: 1.35;
    }
  </style>
</head>
<body>

  <div class="llm-eyebrow" id="llm-eyebrow">Geopolitica dell'AI</div>
  <h1 class="llm-heading" id="llm-heading">I principali <em>Large Language Models</em></h1>

  <div class="llm-regions">
    <div class="llm-region region-usa">
      <div class="region-header">
        <span class="region-flag">🇺🇸</span>
        <span class="region-name" id="lbl-usa">Stati Uniti</span>
        <span class="region-count">6</span>
      </div>
      <div class="region-cards" id="usa-cards"></div>
    </div>
    <div class="llm-region region-eu">
      <div class="region-header">
        <span class="region-flag">🇪🇺</span>
        <span class="region-name" id="lbl-eu">Europa</span>
        <span class="region-count">1</span>
      </div>
      <div class="region-cards" id="eu-cards"></div>
    </div>
    <div class="llm-region region-cn">
      <div class="region-header">
        <span class="region-flag">🇨🇳</span>
        <span class="region-name" id="lbl-cn">Cina</span>
        <span class="region-count">3</span>
      </div>
      <div class="region-cards" id="cn-cards"></div>
    </div>
  </div>

  <div id="nav-dots"></div>
  <a class="nav-arrow" id="nav-prev" href="#">&#8592;</a>
  <a class="nav-arrow" id="nav-next" href="#">&#8594;</a>

  <div id="lang-toggle">
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <script src="js/common.js"></script>
  <script>
    /* ── inline SVG icons ── */
    const SVG_OPENAI = `<svg viewBox="0 0 32 32" fill="white">
      <rect x="14" y="1" width="4" height="13" rx="2" transform="rotate(0,16,16)"/>
      <rect x="14" y="1" width="4" height="13" rx="2" transform="rotate(60,16,16)"/>
      <rect x="14" y="1" width="4" height="13" rx="2" transform="rotate(120,16,16)"/>
      <rect x="14" y="1" width="4" height="13" rx="2" transform="rotate(180,16,16)"/>
      <rect x="14" y="1" width="4" height="13" rx="2" transform="rotate(240,16,16)"/>
      <rect x="14" y="1" width="4" height="13" rx="2" transform="rotate(300,16,16)"/>
    </svg>`;

    const SVG_GEMINI = `<svg viewBox="0 0 32 32" fill="white">
      <path d="M16 2C15.2 9.2 11.6 12.8 4 16C11.6 19.2 15.2 22.8 16 30C16.8 22.8 20.4 19.2 28 16C20.4 12.8 16.8 9.2 16 2Z"/>
    </svg>`;

    const SVG_META = `<svg viewBox="0 0 36 22" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round">
      <path d="M18 11C15 5 10 2 6 4C2 6 2 16 6 18C10 20 15 17 18 11C21 5 26 2 30 4C34 6 34 16 30 18C26 20 21 17 18 11Z"/>
    </svg>`;

    const SVG_MSFT = `<svg viewBox="0 0 32 32">
      <rect x="1" y="1" width="14" height="14" fill="#F25022"/>
      <rect x="17" y="1" width="14" height="14" fill="#7FBA00"/>
      <rect x="1" y="17" width="14" height="14" fill="#00A4EF"/>
      <rect x="17" y="17" width="14" height="14" fill="#FFB900"/>
    </svg>`;

    const SVG_DEEPSEEK = `<svg viewBox="0 0 32 32" fill="none" stroke="white" stroke-width="2">
      <ellipse cx="16" cy="14" rx="10" ry="10"/>
      <circle cx="12" cy="12" r="2.5" fill="white" stroke="none"/>
      <path d="M16 24 C16 24 20 28 24 26" stroke-linecap="round"/>
    </svg>`;

    const MODELS = {
      usa: [
        { icon: SVG_OPENAI, brand: '#10a37f', company: 'OpenAI',     model: 'GPT-4o · o3', badgeBg: '#111' },
        { text: 'A',        brand: '#CC785C', company: 'Anthropic',  model: 'Claude 3.7 Sonnet' },
        { icon: SVG_GEMINI, brand: '#4285F4', company: 'Google',     model: 'Gemini 2.0 Flash' },
        { icon: SVG_META,   brand: '#1877F2', company: 'Meta AI',    model: 'Llama 3.3 70B', badgeBg: '#1877F2' },
        { text: 'X',        brand: '#aaa',    company: 'xAI',        model: 'Grok 3', badgeBg: '#1a1a1a', badgeFg: '#fff' },
        { icon: SVG_MSFT,   brand: '#0078D4', company: 'Microsoft',  model: 'Copilot · Phi-4', badgeBg: '#111' },
      ],
      eu: [
        { text: 'M',        brand: '#FF6B35', company: 'Mistral AI', model: 'Mistral Large 2\nMixtral 8×22B' },
      ],
      cn: [
        { icon: SVG_DEEPSEEK, brand: '#4D6BFE', company: 'DeepSeek', model: 'DeepSeek-R1 · V3', badgeBg: '#4D6BFE' },
        { text: '百',         brand: '#2932E1', company: 'Baidu',    model: 'ERNIE 4.0 Turbo' },
        { text: 'Q',          brand: '#FF6A00', company: 'Alibaba',  model: 'Qwen 2.5 Max' },
      ],
    };

    let idx = 0;
    function renderRegion(regionId, models) {
      const c = document.getElementById(regionId + '-cards');
      c.innerHTML = '';
      models.forEach(m => {
        const card = document.createElement('div');
        card.className = 'llm-card';
        const bg = m.badgeBg || m.brand;
        card.style.cssText = `--brand:${m.brand};--badge-bg:${bg};--badge-fg:${m.badgeFg||'#fff'};--i:${idx++}`;
        const badgeInner = m.icon ? m.icon : `<span>${m.text}</span>`;
        card.innerHTML = `
          <div class="llm-badge">${badgeInner}</div>
          <div class="llm-company">${m.company}</div>
          <div class="llm-model">${m.model.replace(/\n/g,'<br>')}</div>`;
        c.appendChild(card);
      });
    }

    function renderAll() { idx = 0; ['usa','eu','cn'].forEach(r => renderRegion(r, MODELS[r])); }

    function onLangChange(l) {
      document.getElementById('lbl-usa').textContent = l === 'it' ? 'Stati Uniti' : 'United States';
      document.getElementById('lbl-eu').textContent  = l === 'it' ? 'Europa'      : 'Europe';
      document.getElementById('lbl-cn').textContent  = l === 'it' ? 'Cina'        : 'China';
      document.getElementById('llm-eyebrow').textContent = l === 'it' ? "Geopolitica dell'AI" : 'AI Geopolitics';
      document.getElementById('llm-heading').innerHTML   = l === 'it'
        ? 'I principali <em>Large Language Models</em>'
        : 'The leading <em>Large Language Models</em>';
    }

    initLangToggle();
    renderAll();
    onLangChange(lang);
    initNav();
  </script>
</body>
</html>
