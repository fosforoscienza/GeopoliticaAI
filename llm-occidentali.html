<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LLM Occidentali — Geopolitica della AI</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    html, body { background: #040e1a !important; overflow: hidden; height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: clamp(20px, 3vh, 40px) clamp(24px, 4vw, 64px) 80px;
      box-sizing: border-box;
    }

    .llm-eyebrow {
      font-size: clamp(12px, 1vw, 16px);
      font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(255,255,255,0.32);
      margin-bottom: clamp(8px, 1.2vh, 16px);
      align-self: flex-start;
    }
    .llm-heading {
      font-size: clamp(36px, 4.5vw, 68px);
      font-weight: 900; letter-spacing: -0.03em; line-height: 0.95;
      color: #fff; text-transform: uppercase;
      margin: 0 0 clamp(24px, 3vh, 44px);
      align-self: flex-start;
    }
    .llm-heading em { color: #41b7ff; font-style: normal; }

    .llm-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(14px, 1.6vw, 24px);
      width: 100%;
      max-width: 1500px;
    }

    .llm-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      border-top: 4px solid var(--brand);
      padding: clamp(18px, 2.2vh, 28px) clamp(14px, 1.4vw, 22px);
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
      animation: card-in 0.5s calc(var(--i,0) * 70ms) cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes card-in {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .llm-badge {
      width: clamp(70px, 7vw, 110px);
      height: clamp(70px, 7vw, 110px);
      border-radius: 18px;
      background: var(--badge-bg, var(--brand));
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(34px, 3.6vw, 56px);
      font-weight: 900; letter-spacing: -0.02em;
      color: var(--badge-fg, #fff);
      margin-bottom: clamp(14px, 1.6vh, 22px); flex-shrink: 0;
    }
    .llm-badge svg { width: 62%; height: 62%; display: block; overflow: visible; }

    .llm-region-flag {
      position: absolute;
      font-size: clamp(18px, 1.8vw, 28px);
    }

    .llm-company {
      font-size: clamp(20px, 2.2vw, 32px);
      font-weight: 800; line-height: 1.15; color: #fff;
      margin-bottom: 6px;
    }
    .llm-model {
      font-size: clamp(14px, 1.3vw, 20px);
      font-weight: 500; opacity: 0.88;
      color: var(--brand); letter-spacing: 0.01em; line-height: 1.35;
    }
    .llm-flag-tag {
      display: inline-block;
      margin-top: clamp(10px, 1.2vh, 16px);
      font-size: clamp(12px, 1vw, 16px);
      font-weight: 700; letter-spacing: 0.15em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="llm-eyebrow" id="llm-eyebrow">Geopolitica dell'AI</div>
  <h1 class="llm-heading" id="llm-heading">LLM <em>Occidentali</em></h1>

  <div class="llm-grid" id="llm-grid"></div>

  <div id="nav-dots"></div>
  <a class="nav-arrow" id="nav-prev" href="#">&#8592;</a>
  <a class="nav-arrow" id="nav-next" href="#">&#8594;</a>

  <div id="lang-toggle">
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <script src="js/common.js"></script>
  <script>
    /* ── inline SVG icons ── */
    const SVG_OPENAI = `<svg viewBox="0 0 32 32" fill="white">
      <rect x="14" y="1" width="4" height="13" rx="2" transform="rotate(0,16,16)"/>
      <rect x="14" y="1" width="4" height="13" rx="2" transform="rotate(60,16,16)"/>
      <rect x="14" y="1" width="4" height="13" rx="2" transform="rotate(120,16,16)"/>
      <rect x="14" y="1" width="4" height="13" rx="2" transform="rotate(180,16,16)"/>
      <rect x="14" y="1" width="4" height="13" rx="2" transform="rotate(240,16,16)"/>
      <rect x="14" y="1" width="4" height="13" rx="2" transform="rotate(300,16,16)"/>
    </svg>`;

    const SVG_GEMINI = `<svg viewBox="0 0 32 32" fill="white">
      <path d="M16 2C15.2 9.2 11.6 12.8 4 16C11.6 19.2 15.2 22.8 16 30C16.8 22.8 20.4 19.2 28 16C20.4 12.8 16.8 9.2 16 2Z"/>
    </svg>`;

    const SVG_META = `<svg viewBox="0 0 36 22" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round">
      <path d="M18 11C15 5 10 2 6 4C2 6 2 16 6 18C10 20 15 17 18 11C21 5 26 2 30 4C34 6 34 16 30 18C26 20 21 17 18 11Z"/>
    </svg>`;

    const SVG_MSFT = `<svg viewBox="0 0 32 32">
      <rect x="1" y="1" width="14" height="14" fill="#F25022"/>
      <rect x="17" y="1" width="14" height="14" fill="#7FBA00"/>
      <rect x="1" y="17" width="14" height="14" fill="#00A4EF"/>
      <rect x="17" y="17" width="14" height="14" fill="#FFB900"/>
    </svg>`;

    const MODELS = [
      { icon: SVG_OPENAI, brand: '#10a37f', company: 'OpenAI',     model: 'GPT-4o · o3',            badgeBg: '#111',     flag: '🇺🇸' },
      { text: 'A',        brand: '#CC785C', company: 'Anthropic',  model: 'Claude 3.7 Sonnet',     flag: '🇺🇸' },
      { icon: SVG_GEMINI, brand: '#4285F4', company: 'Google',     model: 'Gemini 2.0 Flash',      flag: '🇺🇸' },
      { icon: SVG_META,   brand: '#1877F2', company: 'Meta AI',    model: 'Llama 3.3 70B',         badgeBg: '#1877F2',  flag: '🇺🇸' },
      { text: 'X',        brand: '#aaa',    company: 'xAI',        model: 'Grok 3',                badgeBg: '#1a1a1a',  badgeFg: '#fff', flag: '🇺🇸' },
      { icon: SVG_MSFT,   brand: '#0078D4', company: 'Microsoft',  model: 'Copilot · Phi-4',       badgeBg: '#111',     flag: '🇺🇸' },
      { text: 'M',        brand: '#FF6B35', company: 'Mistral AI', model: 'Mistral Large 2\nMixtral 8×22B',  flag: '🇪🇺' },
    ];

    function renderModels() {
      const grid = document.getElementById('llm-grid');
      grid.innerHTML = '';
      MODELS.forEach((m, i) => {
        const card = document.createElement('div');
        card.className = 'llm-card';
        const bg = m.badgeBg || m.brand;
        card.style.cssText = `--brand:${m.brand};--badge-bg:${bg};--badge-fg:${m.badgeFg||'#fff'};--i:${i}`;
        const badgeInner = m.icon ? m.icon : `<span>${m.text}</span>`;
        card.innerHTML = `
          <div class="llm-badge">${badgeInner}</div>
          <div class="llm-company">${m.company}</div>
          <div class="llm-model">${m.model.replace(/\n/g,'<br>')}</div>
          <div class="llm-flag-tag">${m.flag}</div>`;
        grid.appendChild(card);
      });
    }

    function onLangChange(l) {
      document.getElementById('llm-eyebrow').textContent = l === 'it' ? "Geopolitica dell'AI" : 'AI Geopolitics';
      document.getElementById('llm-heading').innerHTML   = l === 'it'
        ? 'LLM <em>Occidentali</em>'
        : 'Western <em>LLMs</em>';
    }

    initLangToggle();
    renderModels();
    onLangChange(lang);
    initNav();
  </script>
</body>
</html>
