<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fosforo Dashboard — Geopolitica della AI</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    html, body { background: #000 !important; overflow: hidden; height: 100%; margin: 0; }

    .screen-wrap {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .screen-img {
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center top;
    }

    .screen-label {
      position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
      font-size: clamp(11px, 0.9vw, 14px);
      font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="screen-wrap">
    <img class="screen-img" src="img/fosforo-dashboard.png" alt="Fosforo Dashboard"/>
  </div>

  <div class="screen-label">fosforo.me — Dashboard</div>

  <div id="nav-dots"></div>
  <a class="nav-arrow" id="nav-prev" href="#">&#8592;</a>
  <a class="nav-arrow" id="nav-next" href="#">&#8594;</a>

  <div id="lang-toggle">
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <script src="js/common.js"></script>
  <script>
    initLangToggle();
    initNav();
  </script>
</body>
</html>
