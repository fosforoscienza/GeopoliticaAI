<style>

    color: #fff;

  }

  #op-llm-occidentali .llm-eyebrow {
    font-size: clamp(12px, 1vw, 16px);
    font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;

    margin-bottom: clamp(8px, 1.2vh, 16px);
    align-self: flex-start;
  }
  #op-llm-occidentali .llm-heading {
    font-size: clamp(36px, 4.5vw, 68px);
    font-weight: 900; letter-spacing: -0.03em; line-height: 0.95;

    margin: 0 0 clamp(24px, 3vh, 44px);
    align-self: flex-start;
  }
  #op-llm-occidentali .llm-heading em { color: #41b7ff; font-style: normal; }

  #op-llm-occidentali .llm-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(14px, 1.6vw, 24px);
    width: 100%;

  #op-llm-occidentali .llm-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;

    display: flex; flex-direction: column; align-items: center;

    background: var(--badge-bg, var(--brand));

    color: var(--badge-fg, #fff);
    margin-bottom: clamp(14px, 1.6vh, 22px); flex-shrink: 0;
  }
  #op-llm-occidentali .llm-badge svg { width: 62%; height: 62%; display: block; overflow: visible; }

  #op-llm-occidentali .llm-company {

    font-weight: 800; line-height: 1.15; color: #fff;
    margin-bottom: 6px;
  }
  #op-llm-occidentali .llm-model {

    font-weight: 500; opacity: 0.88;
    color: var(--brand); letter-spacing: 0.01em; line-height: 1.35;
  }
  #op-llm-occidentali .llm-flag-tag {
    display: inline-block;
    margin-top: clamp(10px, 1.2vh, 16px);
    font-size: clamp(12px, 1vw, 16px);
    font-weight: 700; letter-spacing: 0.15em;
    color: rgba(255,255,255,0.4);
