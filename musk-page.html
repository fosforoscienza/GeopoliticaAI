<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Musk e Larry Page — Geopolitica della AI</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    :root { --accent: #41b7ff; --accent-soft: #8fd2ff; }
    html, body { background: #000 !important; overflow: hidden; height: 100%; margin: 0; }
    body { font-family: inherit; }

    .stage {
      position: fixed; inset: 0;
      background:
        radial-gradient(70% 60% at 50% 45%, rgba(65,183,255,0.08), transparent 70%),
        #000;
      overflow: hidden;
    }

    /* Foto interamente visibile */
    .photo {
      position: absolute; inset: 0;
      background: url('img/geopolitica/2-musk-page.png') no-repeat center center;
      background-size: contain;
      animation: photo-in 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes photo-in {
      from { opacity: 0; transform: scale(1.03); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Sfumatura inferiore per far respirare i nomi */
    .fade-bottom {
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to top, #000 0%, rgba(0,0,0,0.9) 11%, rgba(0,0,0,0.45) 24%, rgba(0,0,0,0) 40%);
    }

    /* Riga dei nomi in basso, uno sotto ciascun personaggio */
    .names {
      position: absolute; left: 0; right: 0; bottom: clamp(34px, 6.5vh, 70px);
      z-index: 3; display: flex; justify-content: center;
      gap: clamp(60px, 22vw, 360px);
      animation: rise 1s 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .person { text-align: center; }
    .person .rule {
      width: clamp(34px, 4vw, 60px); height: 3px; border-radius: 3px;
      margin: 0 auto clamp(10px, 1.4vh, 16px);
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .person .name {
      font-size: clamp(28px, 3.4vw, 58px);
      font-weight: 900; letter-spacing: -0.02em; line-height: 1;
      margin: 0; color: #fff;
      text-shadow: 0 2px 30px rgba(0,0,0,0.7), 0 0 60px rgba(65,183,255,0.35);
    }
    .person .role {
      margin-top: clamp(6px, 1vh, 12px);
      font-size: clamp(12px, 1.15vw, 18px);
      font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--accent-soft);
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="photo"></div>
    <div class="fade-bottom"></div>

    <div class="names">
      <div class="person">
        <div class="rule"></div>
        <h2 class="name">Elon Musk</h2>
        <div class="role" id="role-musk"></div>
      </div>
      <div class="person">
        <div class="rule"></div>
        <h2 class="name">Larry Page</h2>
        <div class="role" id="role-page"></div>
      </div>
    </div>
  </div>

  <div id="nav-dots"></div>
  <a class="nav-arrow" id="nav-prev" href="napa-valley.html">&#8592;</a>
  <a class="nav-arrow" id="nav-next" href="musk-altman.html">&#8594;</a>

  <div id="lang-toggle">
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <script src="js/common.js"></script>
  <script>
    const TXT = {
      it: { musk: 'Tesla · SpaceX · xAI', page: 'Google · Alphabet' },
      en: { musk: 'Tesla · SpaceX · xAI', page: 'Google · Alphabet' }
    };
    function renderTexts() {
      document.getElementById('role-musk').textContent = TXT[lang].musk;
      document.getElementById('role-page').textContent = TXT[lang].page;
    }
    function onLangChange() { renderTexts(); }

    initLangToggle();
    renderTexts();
    initNav();
  </script>
</body>
</html>
