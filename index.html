<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geopolitica dell'AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #040e1a;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ── Map: true fullscreen cover ── */
    #map-wrap {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #world-map {
      display: block;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* ── Loader ── */
    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #040e1a;
      z-index: 50;
      transition: opacity 0.5s;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid #1a3550;
      border-top-color: #41b7ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Lang toggle ── */
    #lang-toggle {
      position: fixed;
      top: 18px;
      right: 22px;
      z-index: 90;
      display: flex;
      background: rgba(13,33,55,0.80);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(65,183,255,0.15);
      border-radius: 8px;
      padding: 4px;
      gap: 2px;
    }
    .lang-btn {
      padding: 6px 18px;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      background: transparent;
      color: #64748b;
      transition: all 0.18s;
    }
    .lang-btn.active {
      background: rgba(65,183,255,0.18);
      color: #41b7ff;
    }

    /* ── Marker animations ── */
    .pulse-ring {
      animation: pulse-expand 2.6s ease-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes pulse-expand {
      0%   { transform: scale(1);   opacity: 0.8; }
      70%  { transform: scale(3.0); opacity: 0;   }
      100% { transform: scale(3.0); opacity: 0;   }
    }
    .marker-dot {
      transition: transform 0.18s ease;
      transform-box: fill-box;
      transform-origin: center;
    }
    .marker-group { cursor: pointer; }
    .marker-group:hover .marker-dot { transform: scale(1.8); }
    .marker-flag { pointer-events: none; user-select: none; }

    /* ── Modal backdrop ── */
    #modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(4,14,26,0.78);
      backdrop-filter: blur(7px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }
    #modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Modal card ── */
    #modal-card {
      width: 100%;
      max-width: 460px;
      max-height: 88vh;
      overflow-y: auto;
      border-radius: 20px;
      background: #0d2137;
      border: 1px solid #1a3550;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
      scrollbar-width: thin;
      scrollbar-color: #1a3550 transparent;
    }
    #modal-backdrop.open #modal-card {
      transform: translateY(0) scale(1);
    }

    #modal-image {
      position: relative;
      height: 190px;
      overflow: hidden;
      border-radius: 20px 20px 0 0;
    }
    #modal-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .modal-img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 35%, rgba(13,33,55,0.92) 100%);
    }
    #modal-flag {
      position: absolute;
      bottom: 14px; left: 20px;
      font-size: 40px; line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.7));
    }
    #modal-close {
      position: absolute;
      top: 12px; right: 12px;
      width: 30px; height: 30px;
      border-radius: 50%; border: none;
      background: rgba(0,0,0,0.55);
      color: #fff; font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.18s;
    }
    #modal-close:hover { background: rgba(0,0,0,0.8); }
    #modal-img-caption {
      position: absolute;
      bottom: 10px; right: 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    #modal-body { padding: 18px 22px 26px; }
    #modal-title {
      font-size: 18px; font-weight: 700;
      line-height: 1.25; margin-bottom: 6px;
    }
    #modal-role {
      display: inline-block;
      font-size: 12px; font-weight: 600;
      padding: 3px 10px; border-radius: 100px;
      margin-bottom: 14px;
    }
    #modal-desc {
      font-size: 14px; line-height: 1.72;
      color: #94a3b8; margin-bottom: 16px;
    }
    #modal-facts { display: flex; flex-wrap: wrap; gap: 7px; }
    .fact-chip {
      font-size: 12px; padding: 5px 12px;
      border-radius: 100px; border: 1px solid;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div id="map-wrap">
  <svg id="world-map"></svg>
</div>

<div id="lang-toggle">
  <button class="lang-btn active" onclick="setLang('it')">IT</button>
  <button class="lang-btn"        onclick="setLang('en')">EN</button>
</div>

<div id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div id="modal-card">
    <div id="modal-image">
      <img id="modal-img" src="" alt="" onerror="this.style.opacity='0'" />
      <div class="modal-img-overlay"></div>
      <span id="modal-flag"></span>
      <button id="modal-close" onclick="closeModal()">×</button>
      <span id="modal-img-caption"></span>
    </div>
    <div id="modal-body">
      <div id="modal-title"></div>
      <span id="modal-role"></span>
      <p id="modal-desc"></p>
      <div id="modal-facts"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
// ─────────────────────────────────────────────────────────────
// i18n — UI strings only (actor text lives in SCHEDE/*.json)
// ─────────────────────────────────────────────────────────────
const UI = {
  it: { pageTitle: "Geopolitica dell'AI", loadError: "Errore nel caricamento della mappa." },
  en: { pageTitle: "AI Geopolitics",      loadError: "Map failed to load. Check your connection." },
};

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let lang = 'it';
let currentActor = null;
let ACTORS = [];

// IDs of all schede to load (order = render order)
const SCHEDE_IDS = ['usa','china','eu','uk','russia','india','uae','canada','japan','israel'];

// ─────────────────────────────────────────────────────────────
// LANGUAGE
// ─────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.title = UI[l].pageTitle;
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim().toLowerCase() === l)
  );
  if (currentActor) renderModal(currentActor);
}

// ─────────────────────────────────────────────────────────────
// LOAD SCHEDE
// ─────────────────────────────────────────────────────────────
async function loadSchede() {
  const results = await Promise.all(
    SCHEDE_IDS.map(id =>
      fetch(`SCHEDE/${id}.json`)
        .then(r => { if (!r.ok) throw new Error(id); return r.json(); })
        .catch(err => { console.error('Failed to load scheda:', err); return null; })
    )
  );
  return results.filter(Boolean);
}

// ─────────────────────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────────────────────
function openModal(actor) {
  currentActor = actor;
  renderModal(actor);
  document.getElementById('modal-backdrop').classList.add('open');
}

function renderModal(actor) {
  const loc = actor[lang];

  document.getElementById('modal-image').style.background =
    `linear-gradient(135deg, #061627 0%, ${actor.color}33 100%)`;
  document.getElementById('modal-card').style.borderColor = actor.color + '44';
  document.getElementById('modal-card').style.boxShadow  = `0 0 60px ${actor.color}18`;

  const img = document.getElementById('modal-img');
  img.src = actor.imageUrl;
  img.style.opacity = '1';

  document.getElementById('modal-flag').textContent       = actor.flag;
  document.getElementById('modal-img-caption').textContent = loc.imageCaption;

  const titleEl = document.getElementById('modal-title');
  titleEl.textContent = loc.title;
  titleEl.style.color = actor.color;

  const roleEl = document.getElementById('modal-role');
  roleEl.textContent     = loc.role;
  roleEl.style.background = actor.color + '1a';
  roleEl.style.color      = actor.color;
  roleEl.style.border     = `1px solid ${actor.color}44`;

  document.getElementById('modal-desc').textContent = loc.desc;

  document.getElementById('modal-facts').innerHTML = loc.facts.map(f =>
    `<span class="fact-chip" style="background:${actor.color}1a;color:${actor.color};border-color:${actor.color}44">${f}</span>`
  ).join('');

  document.getElementById('modal-card').scrollTop = 0;
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  currentActor = null;
}
function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─────────────────────────────────────────────────────────────
// MAP — cover-fill projection
// ─────────────────────────────────────────────────────────────
function buildProjection(W, H) {
  const sphere = { type: 'Sphere' };
  const proj = d3.geoNaturalEarth1();

  // 1. Fit so the sphere fills the viewport maintaining aspect ratio
  proj.fitSize([W, H], sphere);

  // 2. Compute rendered bounds of the sphere
  const pathTmp = d3.geoPath(proj);
  const [[x0, y0], [x1, y1]] = pathTmp.bounds(sphere);
  const mapW = x1 - x0;
  const mapH = y1 - y0;

  // 3. Scale up to cover every pixel (object-fit: cover)
  const coverFactor = Math.max(W / mapW, H / mapH);
  proj.scale(proj.scale() * coverFactor);

  // 4. Re-center after scale change
  proj.translate([W / 2, H / 2]);

  return proj;
}

async function initMap() {
  const W = window.innerWidth;
  const H = window.innerHeight;

  const svg = d3.select('#world-map')
    .attr('width', W).attr('height', H);

  const projection = buildProjection(W, H);
  const path = d3.geoPath(projection);

  // Ocean base
  svg.append('rect').attr('width', W).attr('height', H).attr('fill', '#040e1a');

  // Load world topology + all schede in parallel
  const [world, actors] = await Promise.all([
    d3.json('https://unpkg.com/world-atlas@2/countries-110m.json'),
    loadSchede(),
  ]);

  ACTORS = actors;

  const land      = topojson.feature(world, world.objects.land);
  const countries = topojson.feature(world, world.objects.countries);
  const borders   = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);

  // ISO numeric → actor lookup
  const isoMap = {};
  ACTORS.forEach(a => a.isoNums.forEach(n => { isoMap[n] = a; }));

  // Land base
  svg.append('path').datum(land).attr('d', path).attr('fill', '#0d2137');

  // Highlighted countries
  svg.selectAll('.hi')
    .data(countries.features.filter(d => isoMap[d.id]))
    .join('path').attr('class', 'hi')
    .attr('d', path)
    .attr('fill',   d => isoMap[d.id].color + '22')
    .attr('stroke', d => isoMap[d.id].color + '60')
    .attr('stroke-width', 1.2);

  // Internal borders
  svg.append('path').datum(borders).attr('d', path)
    .attr('fill', 'none').attr('stroke', '#1a3550').attr('stroke-width', 0.4);

  // Graticule
  svg.append('path').datum(d3.geoGraticule()()).attr('d', path)
    .attr('fill', 'none').attr('stroke', 'rgba(255,255,255,0.04)').attr('stroke-width', 0.5);

  // Globe outline
  svg.append('path').datum({ type: 'Sphere' }).attr('d', path)
    .attr('fill', 'none').attr('stroke', '#1a3550').attr('stroke-width', 0.8);

  // Markers
  ACTORS.forEach(actor => {
    const proj = projection(actor.coords);
    if (!proj) return;
    const [x, y] = proj;
    if (isNaN(x) || isNaN(y)) return;

    const g = svg.append('g')
      .attr('class', 'marker-group')
      .attr('transform', `translate(${x},${y})`)
      .on('click', () => openModal(actor));

    g.append('circle').attr('class', 'pulse-ring')
      .attr('r', 12).attr('fill', 'none')
      .attr('stroke', actor.color).attr('stroke-width', 1.8);

    g.append('circle').attr('class', 'marker-dot')
      .attr('r', 7).attr('fill', actor.color)
      .attr('stroke', '#f0f5fb').attr('stroke-width', 1.8)
      .style('filter', `drop-shadow(0 0 6px ${actor.color})`);

    g.append('text').attr('class', 'marker-flag')
      .attr('y', -15).attr('text-anchor', 'middle')
      .attr('font-size', '16px').text(actor.flag);
  });

  // Hide loader
  const loader = document.getElementById('loader');
  loader.style.opacity = '0';
  setTimeout(() => loader.remove(), 500);
}

// ─────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────
document.title = UI[lang].pageTitle;
initMap().catch(err => {
  console.error(err);
  const loader = document.getElementById('loader');
  loader.innerHTML = `<p style="color:#64748b;font-size:14px">${UI[lang].loadError}</p>`;
});
</script>
</body>
</html>
