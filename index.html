<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geopolitica dell'AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #040e1a;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ── Map fills entire viewport ── */
    #map-wrap {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }
    #world-map {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── Loader ── */
    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #040e1a;
      z-index: 50;
      transition: opacity 0.5s;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid #1a3550;
      border-top-color: #41b7ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Language toggle ── */
    #lang-toggle {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 90;
      display: flex;
      background: rgba(13,33,55,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid #1a3550;
      border-radius: 8px;
      padding: 4px;
      gap: 2px;
    }
    .lang-btn {
      padding: 6px 16px;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      background: transparent;
      color: #64748b;
      transition: all 0.18s;
    }
    .lang-btn.active {
      background: rgba(65,183,255,0.18);
      color: #41b7ff;
    }

    /* ── Marker animations ── */
    .pulse-ring {
      animation: pulse-expand 2.6s ease-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes pulse-expand {
      0%   { transform: scale(1);   opacity: 0.7; }
      65%  { transform: scale(2.8); opacity: 0;   }
      100% { transform: scale(2.8); opacity: 0;   }
    }
    .marker-dot {
      transition: transform 0.18s ease;
      transform-box: fill-box;
      transform-origin: center;
      cursor: pointer;
    }
    .marker-group { cursor: pointer; }
    .marker-group:hover .marker-dot { transform: scale(1.7); }
    .marker-flag {
      pointer-events: none;
      user-select: none;
    }

    /* ── Modal backdrop ── */
    #modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(4,14,26,0.80);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }
    #modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Modal card ── */
    #modal-card {
      width: 100%;
      max-width: 460px;
      max-height: 88vh;
      overflow-y: auto;
      border-radius: 20px;
      background: #0d2137;
      border: 1px solid #1a3550;
      transform: translateY(18px) scale(0.97);
      transition: transform 0.24s cubic-bezier(0.34,1.56,0.64,1);
      scrollbar-width: thin;
      scrollbar-color: #1a3550 transparent;
    }
    #modal-backdrop.open #modal-card {
      transform: translateY(0) scale(1);
    }

    /* ── Modal image header ── */
    #modal-image {
      position: relative;
      height: 190px;
      overflow: hidden;
      border-radius: 20px 20px 0 0;
    }
    #modal-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s;
    }
    .modal-img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 35%, rgba(13,33,55,0.92) 100%);
    }
    #modal-flag {
      position: absolute;
      bottom: 14px;
      left: 20px;
      font-size: 40px;
      line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.7));
    }
    #modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 30px; height: 30px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s;
      line-height: 1;
    }
    #modal-close:hover { background: rgba(0,0,0,0.8); }
    #modal-img-caption {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    /* ── Modal body ── */
    #modal-body {
      padding: 18px 22px 26px;
    }
    #modal-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 6px;
    }
    #modal-role {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 14px;
    }
    #modal-desc {
      font-size: 14px;
      line-height: 1.72;
      color: #94a3b8;
      margin-bottom: 16px;
    }
    #modal-facts {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .fact-chip {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 100px;
      border: 1px solid;
      white-space: nowrap;
    }
  </style>

let lang = 'it';
let currentActor = null;

function ui(key) { return UI[lang][key]; }
function a(actor, key) { return actor[lang][key]; }

// ─────────────────────────────────────────────────────────────
// LANGUAGE
// ─────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.title = ui('pageTitle');
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim().toLowerCase() === l);
  });
  if (currentActor) renderModal(currentActor);
}

// ─────────────────────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────────────────────
function openModal(actor) {
  currentActor = actor;
  renderModal(actor);
  document.getElementById('modal-backdrop').classList.add('open');
}

function renderModal(actor) {
  const img = document.getElementById('modal-img');
  img.src = actor.imageUrl;
  img.style.opacity = '1';

  document.getElementById('modal-image').style.background =
    `linear-gradient(135deg, #061627 0%, ${actor.color}33 100%)`;
  document.getElementById('modal-card').style.borderColor = actor.color + '44';
  document.getElementById('modal-card').style.boxShadow  = `0 0 60px ${actor.color}18`;

  document.getElementById('modal-flag').textContent = actor.flag;
  document.getElementById('modal-img-caption').textContent = actor.imageCaption[lang];

  const titleEl = document.getElementById('modal-title');
  titleEl.textContent = a(actor, 'title');
  titleEl.style.color = actor.color;

  const roleEl = document.getElementById('modal-role');
  roleEl.textContent = a(actor, 'role');
  roleEl.style.background = actor.color + '1a';
  roleEl.style.color       = actor.color;
  roleEl.style.border      = `1px solid ${actor.color}44`;

  document.getElementById('modal-desc').textContent = a(actor, 'desc');

  document.getElementById('modal-facts').innerHTML = a(actor, 'facts').map(f =>
    `<span class="fact-chip" style="background:${actor.color}1a;color:${actor.color};border-color:${actor.color}44">${f}</span>`
  ).join('');

  document.getElementById('modal-card').scrollTop = 0;
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  currentActor = null;
}

function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─────────────────────────────────────────────────────────────
// MAP
// ─────────────────────────────────────────────────────────────
async function initMap() {
  const W = window.innerWidth;
  const H = window.innerHeight;

  const svg = d3.select('#world-map')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('width', W)
    .attr('height', H);

  // Base scale tuned for full-HD viewport
  const scale  = Math.min(W, H * 1.6) / 5.8;
  const projection = d3.geoNaturalEarth1()
    .scale(scale)
    .translate([W / 2, H / 2]);

  const path = d3.geoPath(projection);

  // Ocean
  svg.append('rect').attr('width', W).attr('height', H).attr('fill', '#040e1a');

  try {
    const world = await d3.json('https://unpkg.com/world-atlas@2/countries-110m.json');

    const land      = topojson.feature(world, world.objects.land);
    const countries = topojson.feature(world, world.objects.countries);
    const borders   = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);

    // ISO numeric → actor lookup
    const isoMap = {};
    ACTORS.forEach(a => a.isoNums.forEach(n => { isoMap[n] = a; }));

    // Land base
    svg.append('path')
      .datum(land)
      .attr('d', path)
      .attr('fill', '#0d2137');

    // Highlighted countries
    svg.selectAll('.hi')
      .data(countries.features.filter(d => isoMap[d.id]))
      .join('path')
      .attr('class', 'hi')
      .attr('d', path)
      .attr('fill',   d => isoMap[d.id].color + '22')
      .attr('stroke', d => isoMap[d.id].color + '60')
      .attr('stroke-width', 1.2);

    // Internal borders
    svg.append('path')
      .datum(borders)
      .attr('d', path)
      .attr('fill', 'none')
      .attr('stroke', '#1a3550')
      .attr('stroke-width', 0.4);

    // Graticule
    svg.append('path')
      .datum(d3.geoGraticule()())
      .attr('d', path)
      .attr('fill', 'none')
      .attr('stroke', 'rgba(255,255,255,0.04)')
      .attr('stroke-width', 0.5);

    // Globe outline
    svg.append('path')
      .datum({ type: 'Sphere' })
      .attr('d', path)
      .attr('fill', 'none')
      .attr('stroke', '#1a3550')
      .attr('stroke-width', 0.8);

    // Markers
    ACTORS.forEach(actor => {
      const proj = projection(actor.coords);
      if (!proj) return;
      const [x, y] = proj;
      if (isNaN(x) || isNaN(y)) return;

      const g = svg.append('g')
        .attr('class', 'marker-group')
        .attr('transform', `translate(${x},${y})`)
        .on('click', () => openModal(actor));

      // Pulse ring
      g.append('circle')
        .attr('class', 'pulse-ring')
        .attr('r', 11)
        .attr('fill', 'none')
        .attr('stroke', actor.color)
        .attr('stroke-width', 1.8);

      // Main dot
      g.append('circle')
        .attr('class', 'marker-dot')
        .attr('r', 7)
        .attr('fill', actor.color)
        .attr('stroke', '#f0f5fb')
        .attr('stroke-width', 1.8)
        .style('filter', `drop-shadow(0 0 6px ${actor.color})`);

      // Flag
      g.append('text')
        .attr('class', 'marker-flag')
        .attr('y', -15)
        .attr('text-anchor', 'middle')
        .attr('font-size', '16px')
        .text(actor.flag);
    });

  } catch (err) {
    console.error(err);
    svg.append('text')
      .attr('x', W / 2).attr('y', H / 2)
      .attr('text-anchor', 'middle')
      .attr('fill', '#64748b').attr('font-size', '15px')
      .text(ui('loadError'));
  }

  // Hide loader
  const loader = document.getElementById('loader');
  loader.style.opacity = '0';
  setTimeout(() => loader.remove(), 500);
}

// ─────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────
document.title = ui('pageTitle');
initMap();
</script>
