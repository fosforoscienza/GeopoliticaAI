<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geopolitica della AI</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Title-page only ── */
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; }

    .title-grid {
      position: fixed; inset: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(65,183,255,0.07) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .title-glow {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 75% 65% at 50% 50%, rgba(65,183,255,0.11) 0%, transparent 65%);
      animation: glow-pulse 5s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%,100% { opacity: 0.5; transform: scale(1);    }
      50%      { opacity: 1;   transform: scale(1.15); }
    }

    .title-content { position: relative; z-index: 1; text-align: center; padding: 0 24px; }

    .title-eyebrow {
      font-size: clamp(11px, 1.1vw, 14px); font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(65,183,255,0.7); margin-bottom: clamp(20px,3vh,36px);
      animation: fade-up 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }
    h1 {
      line-height: 0.93; letter-spacing: -0.03em; font-weight: 900;
    }
    .t-l1 {
      display: block; font-size: clamp(72px, 12vw, 160px); color: #f0f5fb;
      animation: fade-up 1s cubic-bezier(0.16,1,0.3,1) 0.25s both;
    }
    .t-l2 {
      display: block; font-size: clamp(72px, 12vw, 160px); color: #41b7ff;
      animation: fade-up 1s cubic-bezier(0.16,1,0.3,1) 0.45s both;
    }
    .title-sub {
      font-size: clamp(15px, 1.6vw, 22px); color: #64748b; font-weight: 300;
      margin-top: clamp(18px, 2.5vh, 32px); letter-spacing: 0.01em;
      animation: fade-up 1s cubic-bezier(0.16,1,0.3,1) 0.7s both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(36px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .slide-hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      font-size: 22px; color: rgba(65,183,255,0.4);
      animation: fade-up 1s both 1.1s, bounce-r 1.8s ease-in-out 2.2s infinite;
    }
    @keyframes bounce-r {
      0%,100% { transform: translateX(-50%); }
      50%      { transform: translateX(calc(-50% + 10px)); }
    }
  </style>
</head>
<body>

  <div class="title-grid"></div>
  <div class="title-glow"></div>

  <div class="title-content">
    <div class="title-eyebrow" id="t-eyebrow">Fosforo: la festa della scienza • versione: v1.5</div>
    <h1>
      <span class="t-l1" id="t-l1">Geopolitica</span>
      <span class="t-l2" id="t-l2">della AI</span>
    </h1>
    <p class="title-sub" id="t-sub">Chi controlla l'intelligenza artificiale controlla il futuro</p>
  </div>

  <div class="slide-hint">→</div>

  <!-- Navigation -->
  <div id="nav-dots">
    <button class="nav-dot active"></button>
    <button class="nav-dot"></button>
    <button class="nav-dot"></button>
    <button class="nav-dot"></button>
  </div>
  <a class="nav-arrow hidden" id="nav-prev">&#8592;</a>
  <a class="nav-arrow" id="nav-next" href="paesi.html">&#8594;</a>

  <!-- Lang toggle -->
  <div id="lang-toggle">
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <script src="js/common.js"></script>
  <script>
    // i18n strings for this page
    const VERSION = 'v1.5';
    const PAGE_TEXT = {
      it: { eyebrow: "Fosforo: la festa della scienza • versione: " + VERSION, l1: "Geopolitica", l2: "della AI",
            sub: "Chi controlla l'intelligenza artificiale controlla il futuro" },
      en: { eyebrow: "Fosforo: la festa della scienza • versione: " + VERSION, l1: "AI",           l2: "Geopolitics",
            sub: "Who controls artificial intelligence controls the future" },
    };

    function onLangChange(l) {
      const t = PAGE_TEXT[l];
      document.title = l === 'it' ? "Geopolitica della AI" : "AI Geopolitics";
      document.getElementById('t-eyebrow').textContent = t.eyebrow;
      document.getElementById('t-l1').textContent      = t.l1;
      document.getElementById('t-l2').textContent      = t.l2;
      document.getElementById('t-sub').textContent     = t.sub;
    }

    initLangToggle();
    initNav(0);
    onLangChange(lang); // apply persisted language
  </script>
</body>
</html>
