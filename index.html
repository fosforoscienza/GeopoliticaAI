<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geopolitica della AI</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Title-page only ── */
    html, body { background: #000 !important; }
    body { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 40px; padding: 60px; }

    .title-container {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      z-index: 1;
    }

    .title-container h1 {
      font-size: 64px; font-weight: 700; line-height: 1.2;
      color: #f0f5fb; margin-bottom: 20px;
    }

    .title-image {
      flex: 1; max-width: 500px; width: 100%;
      object-fit: contain;
      z-index: 1;
    }

    .slide-hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      font-size: 22px; color: rgba(255,255,255,0.5);
      animation: fade-up 1s both 1.1s, bounce-r 1.8s ease-in-out 2.2s infinite;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(36px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce-r {
      0%,100% { transform: translateX(-50%); }
      50%      { transform: translateX(calc(-50% + 10px)); }
    }
  </style>
</head>
<body>

  <div class="title-container">
    <h1>THE AI ERA<br>Chi controlla l'Intelligenza Artificiale controlla il futuro</h1>
  </div>

  <img class="title-image" src="Mattia-THE-AI-ERA.png" alt="The AI Era" />

  <div class="slide-hint">→</div>

  <!-- Navigation -->
  <div id="nav-dots">
    <button class="nav-dot active"></button>
    <button class="nav-dot"></button>
    <button class="nav-dot"></button>
    <button class="nav-dot"></button>
    <button class="nav-dot"></button>
    <button class="nav-dot"></button>
    <button class="nav-dot"></button>
    <button class="nav-dot"></button>
    <button class="nav-dot"></button>
    <button class="nav-dot"></button>
  </div>
  <a class="nav-arrow hidden" id="nav-prev">&#8592;</a>
  <a class="nav-arrow" id="nav-next" href="video.html">&#8594;</a>

  <!-- Lang toggle -->
  <div id="lang-toggle">
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <script src="js/common.js"></script>
  <script>
    function onLangChange(l) {
      document.title = l === 'it' ? "Geopolitica della AI" : "AI Geopolitics";
    }

    initLangToggle();
    initNav();
    onLangChange(lang);
  </script>
</body>
</html>
