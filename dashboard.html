<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Ordina Slide</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html, body { background: #040e1a !important; }
    body {
      color: #f0f5fb; margin: 0; min-height: 100vh;
      padding: 36px 24px 80px; box-sizing: border-box;
      overflow-y: auto;
    }
    .dash-container { max-width: 1320px; margin: 0 auto; }

    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; gap: 16px; flex-wrap: wrap;
    }
    .dash-header h1 {
      font-size: clamp(24px, 2.6vw, 36px);
      font-weight: 800; letter-spacing: -0.02em; margin: 0;
    }
    .dash-back {
      color: rgba(255,255,255,0.55); text-decoration: none;
      font-size: 14px; font-weight: 500; transition: color 0.18s;
    }
    .dash-back:hover { color: #41b7ff; }
    .dash-help {
      color: rgba(255,255,255,0.45); font-size: 13px;
      margin-bottom: 24px; line-height: 1.55;
    }
    kbd {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px; padding: 1px 6px;
      font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px;
      color: #f0f5fb;
    }

    .dash-actions {
      display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
      align-items: center;
      position: sticky; top: -1px; z-index: 5; padding: 16px 0;
      background: linear-gradient(to bottom, #040e1a 70%, rgba(4,14,26,0.95));
    }
    .dash-btn {
      padding: 10px 20px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.8);
      font-size: 13px; font-weight: 600; letter-spacing: 0.05em;
      cursor: pointer; transition: all 0.18s; font-family: inherit;
    }
    .dash-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.25); color: #fff;
    }
    .dash-btn.primary {
      background: rgba(65,183,255,0.18);
      border-color: rgba(65,183,255,0.5); color: #41b7ff;
    }
    .dash-btn.primary:hover { background: rgba(65,183,255,0.28); color: #7cd0ff; }
    .dash-btn.danger { color: #f87171; }
    .dash-btn.danger:hover { color: #fca5a5; border-color: rgba(248,113,113,0.4); }

    /* View switch */
    .view-switch { display: inline-flex; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; overflow: hidden; margin-right: auto; }
    .view-switch button {
      padding: 10px 16px; border: none; background: transparent;
      color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 700;
      letter-spacing: 0.04em; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; gap: 7px; transition: all 0.15s;
    }
    .view-switch button.active { background: rgba(65,183,255,0.2); color: #7cd0ff; }
    .view-switch button:not(.active):hover { background: rgba(255,255,255,0.06); color: #fff; }

    /* ═══════════ GRID (card) view ═══════════ */
    /* keep the [hidden] attribute working despite the display rules below */
    .dash-grid[hidden], .dash-list[hidden] { display: none !important; }
    .dash-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 224px);
      gap: 16px; justify-content: start;
    }
    .dash-card {
      position: relative; width: 224px;
      border-radius: 12px; overflow: hidden;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: grab; user-select: none; touch-action: none;
      transition: border 0.15s, box-shadow 0.15s, opacity 0.15s, transform 0.12s;
    }
    .dash-card:hover { border-color: rgba(255,255,255,0.28); transform: translateY(-2px); }
    .dash-card.dragging { opacity: 0.35; cursor: grabbing; border-color: rgba(65,183,255,0.6); }
    .dash-card.drop-left  { box-shadow: -3px 0 0 0 #41b7ff inset; }
    .dash-card.drop-right { box-shadow: 3px 0 0 0 #41b7ff inset; }
    .dash-card.is-hidden { opacity: 0.42; }
    .dash-card.is-hidden:hover { opacity: 0.7; }

    .card-thumb {
      position: relative; width: 224px; height: 126px;
      overflow: hidden; background: #0a1929;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .card-thumb iframe {
      position: absolute; top: 0; left: 0;
      width: 1600px; height: 900px;
      transform: scale(0.14); transform-origin: top left;
      border: none; pointer-events: none;
    }
    .card-pos {
      position: absolute; top: 8px; left: 8px; z-index: 2;
      min-width: 22px; height: 22px; padding: 0 6px;
      border-radius: 6px; background: rgba(4,14,26,0.82);
      border: 1px solid rgba(65,183,255,0.5);
      color: #7cd0ff; font-size: 12px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .card-eye {
      position: absolute; top: 8px; right: 8px; z-index: 2;
      width: 26px; height: 26px; border-radius: 6px;
      background: rgba(4,14,26,0.82); border: 1px solid rgba(255,255,255,0.18);
      color: #fff; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; padding: 0; backdrop-filter: blur(4px);
    }
    .card-eye:hover { background: rgba(65,183,255,0.3); border-color: rgba(65,183,255,0.6); }
    .card-hidden-badge {
      position: absolute; bottom: 8px; left: 8px; z-index: 2;
      font-size: 10px; font-weight: 800; letter-spacing: 0.12em;
      text-transform: uppercase; color: #fbbf24;
      background: rgba(4,14,26,0.82); padding: 3px 8px; border-radius: 5px;
      border: 1px solid rgba(251,191,36,0.4);
    }
    .card-name {
      padding: 10px 12px; font-size: 13px; font-weight: 600;
      color: #f0f5fb; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-file {
      padding: 0 12px 11px; font-size: 10.5px;
      color: rgba(255,255,255,0.38);
      font-family: ui-monospace, SFMono-Regular, monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ═══════════ LIST view ═══════════ */
    .dash-list { display: grid; gap: 10px; }
    .dash-item {
      display: grid; grid-template-columns: 28px 200px 1fr auto;
      gap: 18px; align-items: center;
      padding: 12px 16px; border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: grab; user-select: none; touch-action: none;
      transition: background 0.18s, border 0.18s, opacity 0.18s, transform 0.18s;
    }
    .dash-item:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); }
    .dash-item.dragging { opacity: 0.4; cursor: grabbing; border-color: rgba(65,183,255,0.5); }
    .dash-item.drop-above { box-shadow: 0 -3px 0 0 #41b7ff inset; }
    .dash-item.drop-below { box-shadow: 0 3px 0 0 #41b7ff inset; }
    .dash-item.hidden-slide { opacity: 0.45; }
    .dash-handle { display: flex; flex-direction: column; gap: 4px; align-items: center; }
    .move-btn {
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.75); cursor: pointer; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s; padding: 0;
    }
    .move-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); color: #fff; }
    .move-btn:disabled { opacity: 0.18; cursor: default; }
    .dash-thumb {
      width: 200px; height: 112px; position: relative; overflow: hidden;
      border-radius: 6px; background: #0a1929; border: 1px solid rgba(255,255,255,0.08);
    }
    .dash-thumb iframe {
      position: absolute; top: 0; left: 0; width: 1600px; height: 900px;
      transform: scale(0.125); transform-origin: top left;
      border: none; pointer-events: none;
    }
    .dash-meta-block { min-width: 0; }
    .dash-name-input {
      font-size: clamp(16px, 1.3vw, 19px); font-weight: 700; letter-spacing: -0.005em;
      background: transparent; border: none; border-bottom: 1px solid transparent;
      color: #fff; width: 100%; outline: none; padding: 2px 0;
      transition: border-color 0.15s; font-family: inherit;
    }
    .dash-name-input:hover { border-bottom-color: rgba(255,255,255,0.2); }
    .dash-name-input:focus { border-bottom-color: #41b7ff; }
    .dash-file { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; font-family: ui-monospace, SFMono-Regular, monospace; }
    .dash-position { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(65,183,255,0.7); margin-top: 6px; }
    .dash-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px 12px; border-radius: 6px; background: rgba(255,255,255,0.03); }
    .dash-toggle input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #41b7ff; }
    .dash-toggle-label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); letter-spacing: 0.04em; }

    .dash-status {
      margin-top: 28px; font-size: 14px; min-height: 22px;
      color: rgba(255,255,255,0.55); transition: color 0.18s;
    }
    .dash-status.success { color: #4ade80; }
    .dash-status.error   { color: #f87171; }
    .dash-status.warning { color: #fbbf24; }

    @media (max-width: 720px) {
      .dash-item { grid-template-columns: 24px 1fr; gap: 12px; }
      .dash-thumb { display: none; }
      .dash-toggle { grid-column: 2; justify-self: start; }
    }
  </style>
</head>
<body>
  <div class="dash-container">
    <header class="dash-header">
      <h1>Ordina slide</h1>
      <a class="dash-back" href="index.html">← Torna alla presentazione</a>
    </header>
    <p class="dash-help">
      <b>Griglia</b>: trascina le card per riordinare velocemente; clicca l'occhio per nascondere/mostrare.
      <b>Lista</b>: usa ↑ ↓ o trascina, e rinomina le slide.
      Tutto è salvato automaticamente. Premi <kbd>O</kbd> da qualsiasi slide per tornare qui.
    </p>

    <div class="dash-actions">
      <div class="view-switch" id="view-switch">
        <button data-view="grid" id="view-grid">▦ Griglia</button>
        <button data-view="list" id="view-list">≣ Lista</button>
      </div>
      <button class="dash-btn" id="dash-export">Esporta JSON</button>
      <button class="dash-btn" id="dash-import">Importa JSON</button>
      <input type="file" id="dash-file" accept=".json" hidden />
      <button class="dash-btn danger" id="dash-reset">Reset al default</button>
    </div>

    <div class="dash-grid" id="dash-grid" hidden></div>
    <div class="dash-list" id="dash-list" hidden></div>

    <div class="dash-status" id="dash-status">Pronto.</div>
  </div>

  <script src="js/common.js"></script>
  <script>
    const SLIDE_NAMES = {
      'index.html':        'Title page',
      'video.html':        'Intro video',
      'scrittura.html':    'Scrittura — Platone',
      'fotografia.html':   'Fotografia — Baudelaire',
      'pechino-1.html':    'Pechino 1',
      'pechino-2.html':    'Pechino 2',
      'pechino-3.html':    'Pechino 3',
      'timeline.html':     'Timeline AI',
      'napa-valley.html':  'Napa Valley',
      'musk-page.html':    'Musk & Larry Page',
      'musk-page-2.html':  'Musk vs Page — Due visioni',
      'musk-altman.html':  'Musk & Sam Altman',
      'paesi.html':        'Mappa paesi',
      'leader.html':       'Leader & CEO',
      'trump-amodei.html':    'Trump vs Amodei — Foto',
      'anthropic-usa-1.html': 'Anthropic vs Pentagono',
      'anthropic-usa-2.html': 'OpenAI & Pentagono',
      'anthropic-usa-3.html': 'No vs Sì — il punto politico',
      'anthropic-usa-4.html': 'Claude vietato agli stranieri',
      'thiel.html':        'Peter Thiel',
      'palantir-intro.html':   'Palantír — Foto',
      'palantir-intro-2.html': 'Palantír — Cos\'è',
      'palantir.html':     'Palantir',
      'llm-occidentali.html': 'LLM Occidentali',
      'llm-asiatici.html':    'LLM Asiatici',
      'llm-russi.html':       'LLM Russi',
      'paypal-mafia.html':   'PayPal Mafia',
      'paypal-mafia-2.html': 'PayPal Mafia — Cerniere',
      'paypal-mafia-3.html': 'PayPal Mafia — Foto',
      'epistemia.html':    'Epistemia',
      'pappagallo.html':   'Pappagallo Stocastico',
      'alba-transformer.html':  "L'alba dei Transformer",
      'fosforo-web.html':       'Fosforo — Sito',
      'fosforo-dashboard.html': 'Fosforo — Dashboard',
      'tom-brad.html':          'Tom & Brad',
      'tre-fattori.html':       'Tre Fattori',
      'confronto-ai.html':      'Confronto AI'
    };

    const VIEW_KEY = 'geopolitica-dash-view';
    let viewMode = localStorage.getItem(VIEW_KEY) || 'grid';

    // Insert new default slides at their natural position (matches common.js).
    function mergeNewDefaults(order) {
      DEFAULT_PAGES.forEach((p, i) => {
        if (order.includes(p)) return;
        let at = order.length;
        for (let j = i - 1; j >= 0; j--) {
          const idx = order.indexOf(DEFAULT_PAGES[j]);
          if (idx !== -1) { at = idx + 1; break; }
        }
        order.splice(at, 0, p);
      });
      return order;
    }

    function loadConfig() {
      try {
        const raw = localStorage.getItem(SLIDES_CONFIG_KEY);
        if (!raw) return { order: DEFAULT_PAGES.slice(), hidden: [], names: {} };
        const cfg = JSON.parse(raw);
        const known = new Set(DEFAULT_PAGES);
        let order = Array.isArray(cfg.order) ? cfg.order.filter(p => known.has(p)) : [];
        order = mergeNewDefaults(order);
        const hidden = Array.isArray(cfg.hidden) ? cfg.hidden.filter(p => known.has(p)) : [];
        const names = (cfg.names && typeof cfg.names === 'object') ? cfg.names : {};
        return { order, hidden, names };
      } catch (e) {
        return { order: DEFAULT_PAGES.slice(), hidden: [], names: {} };
      }
    }

    let state = loadConfig();
    let saveTimer = null;

    function autoSave() {
      const status = document.getElementById('dash-status');
      try {
        localStorage.setItem(SLIDES_CONFIG_KEY, JSON.stringify(state));
        status.textContent = 'Salvato automaticamente.';
        status.className = 'dash-status success';
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => { status.textContent = 'Pronto.'; status.className = 'dash-status'; }, 1500);
      } catch (e) {
        status.textContent = 'Errore salvataggio: ' + e.message;
        status.className = 'dash-status error';
      }
    }
    function setDirty() { autoSave(); }

    function nameOf(page) { return state.names[page] || SLIDE_NAMES[page] || page; }
    function isHidden(page) { return state.hidden.includes(page); }
    function toggleHidden(page) {
      if (isHidden(page)) state.hidden = state.hidden.filter(p => p !== page);
      else state.hidden.push(page);
    }

    // ═══════════ GRID render ═══════════
    function renderGrid() {
      const grid = document.getElementById('dash-grid');
      grid.innerHTML = '';
      state.order.forEach((page, i) => {
        const hidden = isHidden(page);
        const card = document.createElement('div');
        card.className = 'dash-card' + (hidden ? ' is-hidden' : '');
        card.dataset.page = page;
        card.innerHTML = `
          <div class="card-thumb">
            <div class="card-pos">${i + 1}</div>
            <button class="card-eye" title="${hidden ? 'Mostra' : 'Nascondi'}">${hidden ? '🚫' : '👁'}</button>
            ${hidden ? '<div class="card-hidden-badge">Nascosta</div>' : ''}
            <iframe src="${page}" loading="lazy" scrolling="no" aria-hidden="true" tabindex="-1"></iframe>
          </div>
          <div class="card-name">${nameOf(page)}</div>
          <div class="card-file">${page}</div>
        `;
        const eye = card.querySelector('.card-eye');
        eye.draggable = false;
        eye.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleHidden(page);
          renderGrid();
          setDirty();
        });
        eye.addEventListener('mousedown', (e) => e.stopPropagation());
        grid.appendChild(card);
      });
      setupDnD(grid, 'dash-card', 'x');
    }

    // ═══════════ LIST render ═══════════
    function renderList() {
      const list = document.getElementById('dash-list');
      list.innerHTML = '';
      state.order.forEach((page, i) => {
        const hidden = isHidden(page);
        const item = document.createElement('div');
        item.className = 'dash-item' + (hidden ? ' hidden-slide' : '');
        item.dataset.page = page;
        const name = SLIDE_NAMES[page] || page;
        item.innerHTML = `
          <div class="dash-handle">
            <button class="move-btn up" title="Sposta su">↑</button>
            <button class="move-btn dn" title="Sposta giù">↓</button>
          </div>
          <div class="dash-thumb">
            <iframe src="${page}" loading="lazy" scrolling="no" aria-hidden="true" tabindex="-1"></iframe>
          </div>
          <div class="dash-meta-block">
            <input class="dash-name-input" type="text" spellcheck="false" />
            <div class="dash-file"></div>
            <div class="dash-position">Posizione ${i + 1}${hidden ? ' • Nascosta' : ''}</div>
          </div>
          <label class="dash-toggle">
            <input type="checkbox" />
            <span class="dash-toggle-label">Visibile</span>
          </label>
        `;
        const nameInput = item.querySelector('.dash-name-input');
        nameInput.value = nameOf(page);
        nameInput.placeholder = name;
        nameInput.draggable = false;
        nameInput.addEventListener('input', () => {
          const v = nameInput.value.trim();
          if (v && v !== name) state.names[page] = v; else delete state.names[page];
          setDirty();
        });
        nameInput.addEventListener('keydown', e => e.stopPropagation());
        nameInput.addEventListener('mousedown', e => e.stopPropagation());
        item.querySelector('.dash-file').textContent = page;

        const cb = item.querySelector('input[type=checkbox]');
        cb.checked = !hidden;
        cb.addEventListener('change', () => { toggleHidden(page); renderList(); setDirty(); });

        const upBtn = item.querySelector('.move-btn.up');
        const dnBtn = item.querySelector('.move-btn.dn');
        if (i === 0) upBtn.disabled = true;
        if (i === state.order.length - 1) dnBtn.disabled = true;
        upBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = state.order.indexOf(page);
          if (idx <= 0) return;
          [state.order[idx - 1], state.order[idx]] = [state.order[idx], state.order[idx - 1]];
          renderList(); setDirty();
        });
        dnBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = state.order.indexOf(page);
          if (idx >= state.order.length - 1) return;
          [state.order[idx + 1], state.order[idx]] = [state.order[idx], state.order[idx + 1]];
          renderList(); setDirty();
        });

        list.appendChild(item);
      });
      setupDnD(list, 'dash-item', 'y');
    }

    // Renumber position badges/labels in place (no iframe reload).
    function renumber() {
      document.querySelectorAll('#dash-grid .dash-card').forEach((c, i) => {
        const pos = c.querySelector('.card-pos');
        if (pos) pos.textContent = i + 1;
      });
      document.querySelectorAll('#dash-list .dash-item').forEach((it, i) => {
        const pos = it.querySelector('.dash-position');
        if (pos) pos.textContent = 'Posizione ' + (i + 1) + (isHidden(it.dataset.page) ? ' • Nascosta' : '');
      });
    }

    // ═══════════ Shared drag & drop (pointer-based, live sort) ═══════════
    // Native HTML5 drag is unreliable with the <iframe> thumbnails. We use
    // pointer events plus a full-screen transparent overlay that intercepts
    // every pointer event during the drag — so the iframes can never swallow
    // them. The drop target is found purely from element geometry (no
    // elementFromPoint, which is unreliable over iframes). DOM is reordered
    // live; on release we just renumber + save (no heavy re-render).
    // axis 'x' → reorder by horizontal position (grid); 'y' → vertical (list)
    function setupDnD(container, itemClass, axis) {
      container.querySelectorAll('.' + itemClass).forEach(item => {
        item.addEventListener('pointerdown', (e) => {
          if (e.button !== 0) return;                       // left button / primary touch only
          if (e.target.closest('button, input, a, label, select, textarea')) return; // let controls work
          e.preventDefault();

          const startX = e.clientX, startY = e.clientY;
          let started = false;
          let overlay = null;

          const begin = () => {
            started = true;
            item.classList.add('dragging');
            document.body.style.userSelect = 'none';
            overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;cursor:grabbing;background:transparent;';
            document.body.appendChild(overlay);
          };

          const onMove = (ev) => {
            if (!started) {
              if (Math.abs(ev.clientX - startX) < 5 && Math.abs(ev.clientY - startY) < 5) return;
              begin();
            }
            // Find the sibling the pointer is over, by geometry only.
            const sibs = [...container.querySelectorAll('.' + itemClass)];
            let target = null;
            for (const el of sibs) {
              if (el === item) continue;
              const r = el.getBoundingClientRect();
              if (ev.clientX >= r.left && ev.clientX <= r.right &&
                  ev.clientY >= r.top  && ev.clientY <= r.bottom) { target = el; break; }
            }
            if (!target) return;
            const r = target.getBoundingClientRect();
            const mid = axis === 'x' ? r.left + r.width / 2 : r.top + r.height / 2;
            const pos = axis === 'x' ? ev.clientX : ev.clientY;
            if (pos < mid) container.insertBefore(item, target);
            else           container.insertBefore(item, target.nextSibling);
          };

          const onUp = () => {
            document.removeEventListener('pointermove', onMove);
            document.removeEventListener('pointerup', onUp);
            document.removeEventListener('pointercancel', onUp);
            if (overlay) overlay.remove();
            document.body.style.userSelect = '';
            if (!started) return;
            item.classList.remove('dragging');
            state.order = [...container.children].map(el => el.dataset.page);
            renumber();
            setDirty();
          };

          document.addEventListener('pointermove', onMove);
          document.addEventListener('pointerup', onUp);
          document.addEventListener('pointercancel', onUp);
        });
      });
    }

    // ═══════════ View switch ═══════════
    function render() {
      const grid = document.getElementById('dash-grid');
      const list = document.getElementById('dash-list');
      document.getElementById('view-grid').classList.toggle('active', viewMode === 'grid');
      document.getElementById('view-list').classList.toggle('active', viewMode === 'list');
      if (viewMode === 'grid') {
        grid.hidden = false; list.hidden = true; renderGrid();
      } else {
        list.hidden = false; grid.hidden = true; renderList();
      }
    }

    document.getElementById('view-switch').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-view]');
      if (!btn) return;
      viewMode = btn.dataset.view;
      localStorage.setItem(VIEW_KEY, viewMode);
      render();
    });

    // ═══════════ Buttons ═══════════
    document.getElementById('dash-reset').addEventListener('click', () => {
      if (!confirm('Reset all’ordine predefinito? Le modifiche locali andranno perse.')) return;
      localStorage.removeItem(SLIDES_CONFIG_KEY);
      state = { order: DEFAULT_PAGES.slice(), hidden: [], names: {} };
      render();
      const s = document.getElementById('dash-status');
      s.textContent = 'Reset eseguito. Default ripristinato.';
      s.className = 'dash-status success';
    });

    document.getElementById('dash-export').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'geopolitica-slides-config.json';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      const s = document.getElementById('dash-status');
      s.textContent = 'Configurazione esportata.';
      s.className = 'dash-status success';
    });

    document.getElementById('dash-import').addEventListener('click', () => {
      document.getElementById('dash-file').click();
    });
    document.getElementById('dash-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const cfg  = JSON.parse(text);
        if (!Array.isArray(cfg.order)) throw new Error('campo "order" mancante o non valido');
        const known = new Set(DEFAULT_PAGES);
        let order = cfg.order.filter(p => known.has(p));
        order = mergeNewDefaults(order);
        const hidden = Array.isArray(cfg.hidden) ? cfg.hidden.filter(p => known.has(p)) : [];
        const names = (cfg.names && typeof cfg.names === 'object') ? cfg.names : {};
        state = { order, hidden, names };
        render();
        autoSave();
      } catch (err) {
        const s = document.getElementById('dash-status');
        s.textContent = 'Importazione fallita: ' + err.message;
        s.className = 'dash-status error';
      } finally {
        e.target.value = '';
      }
    });

    initLangToggle && initLangToggle();
    render();
  </script>
</body>
</html>
