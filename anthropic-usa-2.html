<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenAI e il Pentagono — Geopolitica della AI</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root { --accent: #10a37f; --accent-soft: #34d399; }
    html, body { background: #000 !important; overflow: hidden; height: 100%; margin: 0; }
    body { font-family: inherit; }

    .stage {
      position: fixed; inset: 0;
      background:
        radial-gradient(60% 75% at 50% 4%, rgba(16,163,127,0.16), transparent 60%),
        #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: clamp(26px, 4.5vh, 56px) clamp(36px, 6vw, 100px);
      box-sizing: border-box;
    }

    .head { text-align: center; max-width: 1040px;
      animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes rise { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: clamp(11px, 0.95vw, 15px); font-weight: 700;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--accent-soft); margin-bottom: clamp(12px, 1.8vh, 20px);
    }
    .eyebrow .num { color: #04140f; background: var(--accent-soft); border-radius: 5px; padding: 2px 8px; letter-spacing: 0.1em; }
    .title {
      font-size: clamp(34px, 4.6vw, 76px); font-weight: 900;
      letter-spacing: -0.03em; line-height: 0.96; margin: 0; color: #fff;
    }
    .title .hl { color: var(--accent-soft); }
    .lead {
      font-size: clamp(15px, 1.4vw, 22px); line-height: 1.55;
      color: #cbd5e1; font-weight: 300; margin: clamp(16px,2.4vh,28px) auto 0;
      max-width: 920px;
    }
    .lead b { color: #fff; font-weight: 600; }

    .sub {
      max-width: 1040px; text-align: center;
      margin: clamp(22px,3.2vh,38px) auto clamp(14px,2vh,20px);
      font-size: clamp(13px,1.05vw,17px); font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent-soft);
      animation: rise 0.8s .2s cubic-bezier(0.16,1,0.3,1) both;
    }

    .lines {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: clamp(18px, 2.5vw, 36px);
      max-width: 1100px; width: 100%;
    }
    .ln {
      position: relative; padding: clamp(18px,2.6vh,26px) clamp(16px,1.6vw,24px);
      background: rgba(16,163,127,0.06);
      border: 1px solid rgba(16,163,127,0.3); border-radius: 14px; text-align: center;
      animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    .ln:nth-child(1){animation-delay:.28s} .ln:nth-child(2){animation-delay:.4s} .ln:nth-child(3){animation-delay:.52s}
    .ln .ic {
      width: clamp(34px,3vw,46px); height: clamp(34px,3vw,46px); margin: 0 auto clamp(10px,1.4vh,14px);
      border-radius: 50%; background: rgba(16,163,127,0.16); border: 1px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent-soft); font-size: clamp(16px,1.5vw,22px); font-weight: 900;
    }
    .ln .t { font-size: clamp(14px,1.2vw,19px); font-weight: 600; color: #e8edf2; line-height: 1.4; }
    .ln .t b { color: #fff; font-weight: 700; }

    @media (max-aspect-ratio: 1/1) {
      .stage { justify-content: flex-start; overflow-y: auto; padding-top: clamp(36px,6vh,60px); padding-bottom: clamp(90px,13vh,120px); }
      .lines { grid-template-columns: 1fr; max-width: 600px; }
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="head">
      <div class="eyebrow"><span class="num" id="num"></span><span id="eyebrow"></span></div>
      <h1 class="title" id="title"></h1>
      <p class="lead" id="lead"></p>
    </div>

    <div class="sub" id="sub"></div>

    <div class="lines">
      <div class="ln"><div class="ic">✓</div><div class="t" id="l1"></div></div>
      <div class="ln"><div class="ic">✓</div><div class="t" id="l2"></div></div>
      <div class="ln"><div class="ic">✓</div><div class="t" id="l3"></div></div>
    </div>
  </div>

  <div id="nav-dots"></div>
  <a class="nav-arrow" id="nav-prev" href="anthropic-usa-1.html">&#8592;</a>
  <a class="nav-arrow" id="nav-next" href="anthropic-usa-3.html">&#8594;</a>

  <div id="lang-toggle">
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <script src="js/common.js"></script>
  <script>
    const TXT = {
      it: {
        num: '2 / 3', eyebrow: '27–28 Febbraio 2026 · La risposta',
        title: 'OpenAI firma con il <span class="hl">Pentagono</span>',
        lead: 'Poche ore dopo, OpenAI annuncia un accordo con il Pentagono per portare i propri modelli nelle <b>reti militari classificate</b>. <b>Sam Altman</b> sostiene che anche l\'intesa di OpenAI contiene linee rosse simili.',
        sub: 'Le linee rosse rivendicate da OpenAI',
        l1: 'Niente <b>sorveglianza domestica di massa</b>',
        l2: '<b>Responsabilità umana</b> nell\'uso della forza',
        l3: 'Niente <b>direzione di sistemi d\'arma autonomi</b>'
      },
      en: {
        num: '2 / 3', eyebrow: 'February 27–28, 2026 · The response',
        title: 'OpenAI signs with the <span class="hl">Pentagon</span>',
        lead: 'Hours later, OpenAI announces a deal with the Pentagon to bring its models into <b>classified military networks</b>. <b>Sam Altman</b> argues that OpenAI\'s agreement contains similar red lines.',
        sub: 'The red lines claimed by OpenAI',
        l1: 'No <b>domestic mass surveillance</b>',
        l2: '<b>Human accountability</b> in the use of force',
        l3: 'No <b>direction of autonomous weapon systems</b>'
      }
    };
    function set(id, html){ document.getElementById(id).innerHTML = html; }
    function renderTexts() {
      const t = TXT[lang];
      ['num','eyebrow','title','lead','sub','l1','l2','l3'].forEach(k => set(k, t[k]));
    }
    function onLangChange() { renderTexts(); }
    initLangToggle();
    renderTexts();
    initNav();
  </script>
</body>
</html>
