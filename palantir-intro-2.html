<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Che cos'è un Palantír — Geopolitica della AI</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root { --accent: #8b5cf6; --accent-soft: #a78bfa; }
    html, body { background: #000 !important; overflow: hidden; height: 100%; margin: 0; }
    body { font-family: inherit; }

    .stage {
      position: fixed; inset: 0;
      background:
        radial-gradient(60% 80% at 50% 0%, rgba(139,92,246,0.16), transparent 60%),
        radial-gradient(40% 50% at 50% 100%, rgba(139,92,246,0.10), transparent 70%),
        #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: clamp(28px, 5vh, 60px) clamp(36px, 6vw, 100px);
      box-sizing: border-box;
    }

    /* ---------- Intestazione ---------- */
    .head {
      text-align: center; margin-bottom: clamp(22px, 3.4vh, 44px);
      animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes rise { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .eyebrow {
      font-size: clamp(11px, 0.95vw, 15px);
      font-weight: 700; letter-spacing: 0.34em;
      text-transform: uppercase; color: var(--accent-soft);
      margin-bottom: clamp(12px, 1.8vh, 20px);
    }
    .name {
      font-size: clamp(48px, 6.6vw, 110px);
      font-weight: 900; letter-spacing: -0.03em; line-height: 0.9;
      margin: 0; text-transform: uppercase;
      background: linear-gradient(180deg, #ffffff 28%, #c4b5fd 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      text-shadow: 0 0 80px rgba(139,92,246,0.4);
    }
    .lead {
      font-size: clamp(15px, 1.45vw, 23px);
      line-height: 1.55; color: #e2e8f0; font-weight: 300;
      max-width: 980px; margin: clamp(16px,2.4vh,26px) auto 0;
    }
    .lead b { color: #fff; font-weight: 600; }
    .lead .accent { color: var(--accent-soft); font-weight: 600; font-style: italic; }

    /* ---------- Tre blocchi ---------- */
    .cols {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: clamp(22px, 3.2vw, 64px);
      max-width: 1200px; width: 100%;
      margin-bottom: clamp(22px, 3.4vh, 44px);
    }
    .col {
      position: relative; padding-top: clamp(40px, 5vh, 60px);
      animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    .col:nth-child(1){ animation-delay: .15s }
    .col:nth-child(2){ animation-delay: .28s }
    .col:nth-child(3){ animation-delay: .41s }
    .col .num {
      position: absolute; top: 0; left: 0;
      font-size: clamp(30px, 3.4vw, 52px); font-weight: 900;
      line-height: 1; color: transparent;
      -webkit-text-stroke: 1.6px rgba(139,92,246,0.75);
      letter-spacing: -0.02em;
    }
    .col h3 {
      font-size: clamp(17px, 1.5vw, 26px); font-weight: 800;
      color: #fff; margin: 0 0 clamp(8px,1.2vh,12px); letter-spacing: 0.01em;
    }
    .col h3::after {
      content: ''; display: block; width: 40px; height: 3px;
      margin-top: 10px; border-radius: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }
    .col p {
      font-size: clamp(13px, 1.1vw, 18px); line-height: 1.55;
      color: #94a3b8; margin: 0;
    }
    .col p b { color: #cbd5e1; font-weight: 600; }

    /* ---------- Chiusura ---------- */
    .closing {
      max-width: 1000px; text-align: center;
      font-size: clamp(16px, 1.55vw, 26px);
      font-style: italic; line-height: 1.5; color: rgba(255,255,255,0.86);
      padding-top: clamp(20px, 3vh, 34px);
      border-top: 1px solid rgba(139,92,246,0.28);
      animation: rise 0.9s 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    .closing b { color: var(--accent-soft); font-style: normal; font-weight: 600; }

    @media (max-aspect-ratio: 1/1) {
      .stage { justify-content: flex-start; overflow-y: auto; padding-top: clamp(40px,7vh,70px); padding-bottom: clamp(90px,13vh,120px); }
      .cols { grid-template-columns: 1fr; gap: clamp(18px,2.6vh,28px); max-width: 620px; }
      .col { padding-top: clamp(34px,5vh,48px); }
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="head">
      <div class="eyebrow" id="eyebrow"></div>
      <h1 class="name" id="name"></h1>
      <p class="lead" id="lead"></p>
    </div>

    <div class="cols">
      <div class="col"><span class="num">01</span><h3 id="h1"></h3><p id="p1"></p></div>
      <div class="col"><span class="num">02</span><h3 id="h2"></h3><p id="p2"></p></div>
      <div class="col"><span class="num">03</span><h3 id="h3"></h3><p id="p3"></p></div>
    </div>

    <p class="closing" id="closing"></p>
  </div>

  <div id="nav-dots"></div>
  <a class="nav-arrow" id="nav-prev" href="palantir-intro.html">&#8592;</a>
  <a class="nav-arrow" id="nav-next" href="palantir.html">&#8594;</a>

  <div id="lang-toggle">
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <script src="js/common.js"></script>
  <script>
    const TXT = {
      it: {
        eyebrow: 'J.R.R. Tolkien · Le pietre veggenti',
        name: 'Che cos\'è un Palantír',
        lead: 'Nel mondo di Tolkien i <b>palantíri</b> (singolare <i>palantír</i>, in quenya <span class="accent">«colui che vede da lontano»</span>) sono sfere di cristallo indistruttibili: chi ne possiede una può vedere luoghi remoti e comunicare con chi tiene un\'altra pietra.',
        h1: 'Origine', p1: 'Sette pietre forgiate nell\'Ovest e portate nella Terra di Mezzo, custodite nelle torri di <b>Gondor e Arnor</b>. Strumenti di potere riservati ai re di Númenor.',
        h2: 'Il potere', p2: 'Consentono di vedere eventi distanti nello <b>spazio e nel tempo</b>. Ma rivelano solo ciò che l\'osservatore viene guidato a vedere: la conoscenza non è mai neutra.',
        h3: 'Il pericolo', p3: 'Sauron corruppe le pietre. <b>Saruman e Denethor</b>, credendo di dominarle, ne furono invece dominati, manipolati e condotti alla rovina.',
        closing: 'Da qui il nome dell\'azienda: <b>uno strumento per vedere e connettere oceani di dati</b> — potentissimo, e proprio per questo ambiguo.'
      },
      en: {
        eyebrow: 'J.R.R. Tolkien · The seeing-stones',
        name: 'What is a Palantír',
        lead: 'In Tolkien\'s world the <b>palantíri</b> (singular <i>palantír</i>, Quenya for <span class="accent">“one that sees from afar”</span>) are indestructible crystal spheres: whoever holds one can see distant places and speak with whoever holds another stone.',
        h1: 'Origin', p1: 'Seven stones forged in the West and brought to Middle-earth, kept in the towers of <b>Gondor and Arnor</b>. Instruments of power reserved for the kings of Númenor.',
        h2: 'The power', p2: 'They reveal events distant in <b>space and time</b>. Yet they show only what the viewer is led to see: knowledge is never neutral.',
        h3: 'The danger', p3: 'Sauron corrupted the stones. <b>Saruman and Denethor</b>, believing they commanded them, were instead commanded, deceived and driven to ruin.',
        closing: 'Hence the company\'s name: <b>a tool to see and connect oceans of data</b> — immensely powerful, and for that very reason ambiguous.'
      }
    };

    function set(id, html){ document.getElementById(id).innerHTML = html; }
    function renderTexts() {
      const t = TXT[lang];
      ['eyebrow','name','lead','h1','p1','h2','p2','h3','p3','closing'].forEach(k => set(k, t[k]));
    }
    function onLangChange() { renderTexts(); }

    initLangToggle();
    renderTexts();
    initNav();
  </script>
</body>
</html>
