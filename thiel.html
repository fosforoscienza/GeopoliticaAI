<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peter Thiel — Geopolitica della AI</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root { --accent: #f59e0b; --accent-soft: #fbbf24; }
    html, body { background: #03070f !important; overflow: hidden; height: 100%; margin: 0; }
    body { font-family: inherit; }

    /* ---------- Stage ---------- */
    .stage {
      position: fixed; inset: 0;
      overflow: hidden;
      background: #03070f;
    }

    /* ---------- Hero image (full-bleed, ancorata a sinistra su Thiel) ---------- */
    .hero {
      position: absolute; inset: 0;
      background: url('img/palantir.png') no-repeat center left;
      background-size: cover;
      transform: scale(1.06);
      transform-origin: 30% 50%;
      animation: kenburns 26s ease-in-out infinite alternate;
      will-change: transform;
    }
    @keyframes kenburns {
      from { transform: scale(1.06) translate(0, 0); }
      to   { transform: scale(1.12) translate(1.2%, -1.4%); }
    }

    /* ---------- Cinematic scrims (scuriscono verso destra) ---------- */
    .scrim-right {
      position: absolute; inset: 0;
      background: linear-gradient(
        260deg,
        #03070f 0%,
        rgba(3,7,15,0.97) 24%,
        rgba(3,7,15,0.82) 38%,
        rgba(3,7,15,0.35) 52%,
        rgba(3,7,15,0.05) 66%,
        rgba(3,7,15,0) 78%
      );
    }
    .scrim-bottom {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(3,7,15,0.85) 0%, rgba(3,7,15,0) 32%);
    }
    .vignette {
      position: absolute; inset: 0;
      box-shadow: inset 0 0 240px 60px rgba(0,0,0,0.7);
      pointer-events: none;
    }
    /* glow caldo sul fondatore di sinistra */
    .glow {
      position: absolute;
      top: 48%; left: 34%;
      width: 40vw; height: 40vw;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(245,158,11,0.16) 0%, rgba(245,158,11,0.05) 42%, rgba(245,158,11,0) 70%);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.65; }
      50%     { opacity: 1; }
    }

    /* ---------- Content (colonna destra) ---------- */
    .content {
      position: absolute;
      top: 50%; right: clamp(40px, 6vw, 110px);
      transform: translateY(-50%);
      max-width: min(600px, 52vw);
      z-index: 3;
      text-align: left;
      animation: rise 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(calc(-50% + 26px)); }
      to   { opacity: 1; transform: translateY(-50%); }
    }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: clamp(12px, 0.95vw, 16px);
      font-weight: 700; letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--accent-soft);
      margin-bottom: clamp(14px, 2vh, 24px);
    }
    .eyebrow::before {
      content: ''; width: 34px; height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .name {
      font-size: clamp(54px, 7vw, 118px);
      font-weight: 900; letter-spacing: -0.04em;
      line-height: 0.9;
      margin: 0 0 clamp(16px, 2.2vh, 26px);
      text-transform: uppercase;
      background: linear-gradient(180deg, #ffffff 30%, #fcd34d 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      text-shadow: 0 0 60px rgba(245,158,11,0.32);
    }

    .ticker {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 6px 14px;
      border: 1px solid rgba(245,158,11,0.45);
      border-radius: 999px;
      background: rgba(245,158,11,0.08);
      font-size: clamp(12px, 0.95vw, 15px);
      font-weight: 700; letter-spacing: 0.12em;
      color: #fde68a;
      margin-bottom: clamp(16px, 2.2vh, 26px);
      vertical-align: middle;
    }
    .ticker .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }

    .tagline {
      font-size: clamp(16px, 1.4vw, 22px);
      color: #cbd5e1; font-weight: 300;
      line-height: 1.5; letter-spacing: 0.01em;
      margin: 0 0 clamp(22px, 3vh, 36px);
      max-width: 540px;
    }
    .tagline b { color: #f1f5f9; font-weight: 600; }

    .facts {
      list-style: none; padding: 0; margin: 0;
      display: grid; gap: clamp(8px, 1.1vh, 14px);
      max-width: 560px;
    }
    .facts li {
      font-size: clamp(14px, 1.1vw, 18px);
      color: #e2e8f0; line-height: 1.4;
      padding-left: 30px; position: relative;
      opacity: 0; transform: translateX(12px);
      animation: factin 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .facts li::before {
      content: ''; position: absolute;
      left: 0; top: 0.5em;
      width: 15px; height: 15px;
      background: var(--accent);
      -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2l2.4 6.9L21.6 9l-5.4 4.7L18 21 12 17l-6 4 1.8-7.3L2.4 9l7.2-.1z'/></svg>") center/contain no-repeat;
              mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2l2.4 6.9L21.6 9l-5.4 4.7L18 21 12 17l-6 4 1.8-7.3L2.4 9l7.2-.1z'/></svg>") center/contain no-repeat;
      opacity: 0.9;
    }
    .facts li:nth-child(1) { animation-delay: 0.45s; }
    .facts li:nth-child(2) { animation-delay: 0.54s; }
    .facts li:nth-child(3) { animation-delay: 0.63s; }
    .facts li:nth-child(4) { animation-delay: 0.72s; }
    .facts li:nth-child(5) { animation-delay: 0.81s; }
    .facts li:nth-child(6) { animation-delay: 0.90s; }
    @keyframes factin {
      to { opacity: 1; transform: translateX(0); }
    }

    .quote {
      margin: clamp(20px, 2.8vh, 34px) 0 0;
      padding-left: 20px;
      border-left: 3px solid var(--accent);
      font-size: clamp(16px, 1.45vw, 23px);
      font-style: italic;
      color: rgba(255,255,255,0.78);
      line-height: 1.4;
      max-width: 520px;
    }
    .quote .who { display: block; font-style: normal; font-size: 0.72em; color: var(--accent-soft); margin-top: 8px; letter-spacing: 0.08em; }

    /* ---------- Responsive: stack (portrait) ---------- */
    @media (max-aspect-ratio: 1/1) {
      .hero { background-position: 22% 26%; }
      .scrim-right {
        background: linear-gradient(to top, #03070f 0%, rgba(3,7,15,0.96) 30%, rgba(3,7,15,0.6) 50%, rgba(3,7,15,0.2) 70%, rgba(3,7,15,0) 88%);
      }
      .content {
        top: auto; bottom: clamp(70px, 11vh, 120px);
        right: 50%; transform: none; translate: 50% 0;
        width: min(620px, 88vw); max-width: 88vw;
      }
      @keyframes rise { from { opacity:0; transform: translateY(26px);} to {opacity:1; transform: translateY(0);} }
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="hero"></div>
    <div class="glow"></div>
    <div class="scrim-right"></div>
    <div class="scrim-bottom"></div>
    <div class="vignette"></div>

    <div class="content">
      <div class="eyebrow" id="eyebrow"></div>
      <h1 class="name" id="name"></h1>
      <div class="ticker"><span class="dot"></span><span id="ticker"></span></div>
      <p class="tagline" id="tagline"></p>
      <ul class="facts" id="facts"></ul>
      <blockquote class="quote" id="quote"></blockquote>
    </div>
  </div>

  <div id="nav-dots"></div>
  <a class="nav-arrow" id="nav-prev" href="leader.html">&#8592;</a>
  <a class="nav-arrow" id="nav-next" href="palantir.html">&#8594;</a>

  <div id="lang-toggle">
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <script src="js/common.js"></script>
  <script>
    const TXT = {
      it: {
        eyebrow: 'Tech Founders',
        name: 'Peter Thiel',
        ticker: 'INVESTITORE · n. 1967',
        tagline: '<b>Investitore e contrarian</b> — co-fondatore di PayPal e Palantir, architetto del venture capital di Silicon Valley.',
        facts: [
          'Co-fondatore di PayPal nel 1999 — venduta a eBay per $1,5 mld',
          'Fonda Palantir nel 2003 — analisi dati per CIA, NSA, Pentagono',
          'Primo investitore esterno di Facebook (2004): $500K per il 10,2%',
          'Founders Fund, Clarium, Mithril — portafoglio venture da miliardi',
          'Autore di "Zero to One" (2014) — manifesto del venture capital',
          'Finanziatore decisivo delle campagne di Trump nel 2016 e 2024'
        ],
        quote: '"La concorrenza è per i perdenti."',
        who: 'Peter Thiel'
      },
      en: {
        eyebrow: 'Tech Founders',
        name: 'Peter Thiel',
        ticker: 'INVESTOR · b. 1967',
        tagline: '<b>Investor and contrarian</b> — co-founder of PayPal and Palantir, architect of Silicon Valley venture capital.',
        facts: [
          'Co-founded PayPal in 1999 — sold to eBay for $1.5B',
          'Founded Palantir in 2003 — data analytics for CIA, NSA, Pentagon',
          'First outside investor in Facebook (2004): $500K for 10.2%',
          'Founders Fund, Clarium, Mithril — multi-billion venture portfolio',
          'Author of "Zero to One" (2014) — contemporary VC manifesto',
          'Decisive funder of Trump\'s 2016 and 2024 campaigns'
        ],
        quote: '"Competition is for losers."',
        who: 'Peter Thiel'
      }
    };

    function renderTexts() {
      const t = TXT[lang];
      document.getElementById('eyebrow').textContent = t.eyebrow;
      document.getElementById('name').textContent    = t.name;
      document.getElementById('ticker').textContent  = t.ticker;
      document.getElementById('tagline').innerHTML   = t.tagline;
      document.getElementById('quote').innerHTML     = t.quote + '<span class="who">— ' + t.who + '</span>';
      const ul = document.getElementById('facts');
      ul.innerHTML = '';
      t.facts.forEach(f => {
        const li = document.createElement('li');
        li.textContent = f;
        ul.appendChild(li);
      });
    }
    function onLangChange() { renderTexts(); }

    initLangToggle();
    renderTexts();
    initNav();
  </script>
</body>
</html>
