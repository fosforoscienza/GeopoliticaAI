<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tre Fattori — Geopolitica della AI</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    :root { --c1:#f59e0b; --c2:#f0654f; --c3:#34d399; }
    html, body { background: #05080f !important; overflow: hidden; height: 100%; margin: 0; }
    body { font-family: inherit; }

    .stage {
      position: fixed; inset: 0; overflow: hidden;
      background:
        radial-gradient(60% 70% at 80% 50%, rgba(65,183,255,0.12), transparent 65%),
        radial-gradient(50% 60% at 12% 30%, rgba(139,92,246,0.10), transparent 65%),
        #05080f;
      display: flex; align-items: center;
      gap: clamp(28px, 4vw, 80px);
      padding: clamp(36px, 5vh, 70px) clamp(44px, 6vw, 110px);
      box-sizing: border-box;
      cursor: pointer;
    }

    /* ── step-reveal ── */
    [data-step] {
      opacity: 0; transform: translateY(28px);
      transition: opacity 0.6s cubic-bezier(0.16,1,0.3,1), transform 0.6s cubic-bezier(0.16,1,0.3,1);
      will-change: opacity, transform;
    }
    [data-step].shown { opacity: 1; transform: none; }

    /* ── left: editorial text ── */
    .copy { flex: 1 1 0; min-width: 0; max-width: 980px; z-index: 2; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 14px;
      font-size: clamp(14px, 1.5vw, 22px); font-weight: 700;
      letter-spacing: 0.3em; text-transform: uppercase; color: #8fd2ff;
      margin-bottom: clamp(14px, 2vh, 24px);
    }
    .eyebrow::before { content:''; width: clamp(28px,3vw,52px); height: 2px; background: linear-gradient(90deg,#41b7ff,transparent); }

    .title {
      font-size: clamp(64px, 9vw, 158px);
      font-weight: 900; letter-spacing: -0.03em; line-height: 0.9; margin: 0;
      text-transform: uppercase;
      background: linear-gradient(95deg, #41b7ff 0%, #8b5cf6 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      text-shadow: 0 0 80px rgba(65,183,255,0.3);
    }

    .factors { list-style: none; padding: 0; margin: clamp(28px,4vh,52px) 0 0; }
    .factor {
      display: flex; align-items: baseline; gap: clamp(16px,1.6vw,28px);
      padding: clamp(14px,2vh,22px) 0;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .factor .n {
      flex: 0 0 auto; font-size: clamp(36px, 4vw, 72px); font-weight: 900;
      line-height: 1; letter-spacing: -0.02em;
      -webkit-text-stroke: 2px var(--cc); color: transparent;
    }
    .factor .body { min-width: 0; }
    .factor .lbl {
      font-size: clamp(30px, 3.6vw, 64px); font-weight: 800; line-height: 1;
      color: #fff; letter-spacing: -0.01em; text-transform: uppercase;
    }
    .factor .desc {
      font-size: clamp(18px, 1.9vw, 30px); font-weight: 300; line-height: 1.35;
      color: #aebccd; margin-top: clamp(4px,0.8vh,10px);
    }
    .factor.f1 { --cc: var(--c1); } .factor.f2 { --cc: var(--c2); } .factor.f3 { --cc: var(--c3); }

    /* ── right: stacked-stones image ── */
    .art { flex: 0 0 auto; position: relative; z-index: 2; }
    .art::before {
      content:''; position:absolute; inset:-10% -14%;
      background: radial-gradient(closest-side, rgba(65,183,255,0.35), transparent 72%);
      filter: blur(18px); z-index:-1;
      animation: pulse 5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.65} 50%{opacity:1} }
    .art img {
      height: min(82vh, 720px); width: auto; display: block;
      border-radius: 18px; border: 1px solid rgba(120,190,255,0.28);
      box-shadow: 0 50px 110px -26px rgba(0,0,0,0.85);
      animation: float 7s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

    /* hint di avanzamento */
    #tf-hint {
      position: fixed; left: 50%; bottom: clamp(16px,3vh,32px); transform: translateX(-50%);
      z-index: 20; color: rgba(255,255,255,0.4);
      font-size: clamp(12px,1vw,15px); font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
      display: flex; align-items: center; gap: 10px; transition: opacity 0.4s;
    }
    #tf-hint.gone { opacity: 0; }
    #tf-hint .pip { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.25); transition: background 0.3s; }
    #tf-hint .pip.on { background: #41b7ff; }

    @media (max-aspect-ratio: 1/1) {
      .stage { flex-direction: column; justify-content: center; gap: clamp(20px,3vh,32px); padding: clamp(40px,6vh,70px) 7vw; }
      .copy { order: 2; max-width: 680px; }
      .art { order: 1; }
      .art img { height: min(34vh, 320px); }
      .title { font-size: clamp(54px,12vw,92px); }
    }
  </style>
</head>
<body>

  <div class="stage" id="stage">
    <div class="copy">
      <div class="eyebrow" id="eyebrow" data-step="0"></div>
      <h1 class="title" id="title" data-step="1"></h1>
      <ul class="factors">
        <li class="factor f1" data-step="2"><span class="n">01</span><div class="body"><div class="lbl" id="l1"></div><div class="desc" id="d1"></div></div></li>
        <li class="factor f2" data-step="3"><span class="n">02</span><div class="body"><div class="lbl" id="l2"></div><div class="desc" id="d2"></div></div></li>
        <li class="factor f3" data-step="4"><span class="n">03</span><div class="body"><div class="lbl" id="l3"></div><div class="desc" id="d3"></div></div></li>
      </ul>
    </div>
    <div class="art" data-step="1"><img src="img/pilastri.png" alt="Tre pilastri" /></div>
  </div>

  <div id="tf-hint"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>

  <div id="nav-dots"></div>
  <a class="nav-arrow" id="nav-prev" href="#">&#8592;</a>
  <a class="nav-arrow" id="nav-next" href="#">&#8594;</a>

  <div id="lang-toggle">
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <script src="js/common.js"></script>
  <script>
    const TXT = {
      it: {
        eyebrow: 'Perché qui, perché ora',
        title: 'Tre Fattori',
        l1: 'Hardware', d1: 'Nuova potenza di calcolo: le GPU.',
        l2: 'Reti neurali', d2: 'Algoritmi sempre migliori.',
        l3: 'Dati', d3: 'Enormi quantità di dati.'
      },
      en: {
        eyebrow: 'Why here, why now',
        title: 'Three Factors',
        l1: 'Hardware', d1: 'New compute power: GPUs.',
        l2: 'Neural networks', d2: 'Ever-better algorithms.',
        l3: 'Data', d3: 'Enormous amounts of data.'
      }
    };
    function set(id,v){ document.getElementById(id).textContent = v; }
    function renderTexts(){
      const t = TXT[lang];
      ['eyebrow','title','l1','d1','l2','d2','l3','d3'].forEach(k => set(k, t[k]));
    }
    function onLangChange(){ renderTexts(); }

    // ── step-reveal ──────────────────────────────────────
    const STEPS = 4;                              // 0 = eyebrow; 1..4 reveal title/foto + 3 fattori
    const EMBED = window.self !== window.top;
    if (EMBED) window.__opSelfNav = true;         // tell the onepage shell: I handle my own nav
    let step = 0;
    const hint = document.getElementById('tf-hint');

    function applyStep() {
      document.querySelectorAll('[data-step]').forEach(el => {
        el.classList.toggle('shown', parseInt(el.dataset.step, 10) <= step);
      });
      const pips = hint.querySelectorAll('.pip');
      pips.forEach((p, idx) => p.classList.toggle('on', idx <= step));
      hint.classList.toggle('gone', step >= STEPS);
    }
    function hrefFor(idx) {
      return (typeof pageHref === 'function') ? pageHref(idx) : (PAGES[idx] + '?i=' + idx);
    }
    function goNext() {
      if (EMBED) { try { parent.postMessage({ type:'op-nav', dir:'next' }, '*'); } catch(e){} return; }
      const ni = currentPageIndex() + 1;
      if (PAGES[ni]) window.location.href = hrefFor(ni);
    }
    function goPrev() {
      if (EMBED) { try { parent.postMessage({ type:'op-nav', dir:'prev' }, '*'); } catch(e){} return; }
      const pi = currentPageIndex() - 1;
      if (pi >= 0 && PAGES[pi]) window.location.href = hrefFor(pi);
    }
    function forward() { if (step < STEPS) { step++; applyStep(); } else { goNext(); } }
    function backward() { if (step > 0) { step--; applyStep(); } else { goPrev(); } }

    // click anywhere (tranne i controlli) avanza
    document.addEventListener('click', (e) => {
      if (e.target.closest('#nav-dots, #lang-toggle, .nav-arrow')) return;
      forward();
    });
    // tastiera / telecomando — in capture, così precede il forwarding embed
    window.addEventListener('keydown', (e) => {
      const tag = (e.target && e.target.tagName) || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA' || (e.target && e.target.isContentEditable)) return;
      const k = e.key, c = e.code;
      const isN = k==='ArrowRight'||c==='ArrowRight'||k==='ArrowDown'||c==='ArrowDown'||k==='PageDown'||c==='PageDown'||k===' '||k==='Spacebar'||c==='Space'||k==='Enter'||c==='Enter';
      const isP = k==='ArrowLeft'||c==='ArrowLeft'||k==='ArrowUp'||c==='ArrowUp'||k==='PageUp'||c==='PageUp'||k==='Backspace'||c==='Backspace';
      if (isN) { e.preventDefault(); e.stopImmediatePropagation(); forward(); }
      else if (isP) { e.preventDefault(); e.stopImmediatePropagation(); backward(); }
    }, true);

    initLangToggle();
    renderTexts();
    if (typeof buildNavDots === 'function') buildNavDots(currentPageIndex());
    if (typeof initNavArrows === 'function') initNavArrows(currentPageIndex());
    applyStep();
  </script>
</body>
</html>
