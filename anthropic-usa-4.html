<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocco all'export di Claude — Geopolitica della AI</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root { --accent: #cc785c; --accent-soft: #e8a48c; --red: #ef4444; }
    html, body { background: #000 !important; overflow: hidden; height: 100%; margin: 0; }
    body { font-family: inherit; }

    .stage {
      position: fixed; inset: 0;
      background:
        radial-gradient(60% 75% at 50% 4%, rgba(204,120,92,0.16), transparent 60%),
        #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: clamp(24px, 4vh, 52px) clamp(36px, 6vw, 100px);
      box-sizing: border-box;
    }

    .head { text-align: center; max-width: 1040px;
      animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes rise { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: clamp(11px, 0.95vw, 15px); font-weight: 700;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--accent-soft); margin-bottom: clamp(12px, 1.8vh, 20px);
    }
    .eyebrow .num { color: #fff; background: var(--accent); border-radius: 5px; padding: 2px 8px; letter-spacing: 0.1em; }
    .title {
      font-size: clamp(32px, 4.4vw, 72px); font-weight: 900;
      letter-spacing: -0.03em; line-height: 0.98; margin: 0; color: #fff;
    }
    .title .hl { color: var(--accent-soft); }
    .lead {
      font-size: clamp(15px, 1.35vw, 21px); line-height: 1.55;
      color: #cbd5e1; font-weight: 300; margin: clamp(14px,2.2vh,24px) auto 0;
      max-width: 940px;
    }
    .lead b { color: #fff; font-weight: 600; }

    /* modelli bloccati */
    .models {
      display: flex; justify-content: center; gap: clamp(16px,2.5vw,36px);
      flex-wrap: wrap; margin: clamp(20px,3vh,34px) 0 0;
    }
    .model {
      position: relative; display: flex; align-items: center; gap: 14px;
      padding: clamp(14px,1.9vh,20px) clamp(20px,2vw,30px);
      background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.32);
      border-radius: 14px;
      animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    .model:nth-child(1){animation-delay:.15s} .model:nth-child(2){animation-delay:.27s}
    .model .lock {
      width: clamp(34px,2.8vw,42px); height: clamp(34px,2.8vw,42px); flex-shrink: 0;
      border-radius: 50%; background: rgba(239,68,68,0.16); border: 1px solid var(--red);
      display: flex; align-items: center; justify-content: center;
      color: var(--red); font-size: clamp(16px,1.5vw,20px);
    }
    .model .mt { text-align: left; }
    .model .k { font-size: clamp(10px,0.8vw,12px); font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; color: var(--red); }
    .model .n { font-size: clamp(18px,1.6vw,26px); font-weight: 800; color: #fff; line-height: 1.1; }

    /* motivazione + replica */
    .cols {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: clamp(20px,3vw,48px); max-width: 1080px; width: 100%;
      margin-top: clamp(20px,3vh,36px);
      padding-top: clamp(16px,2.4vh,24px); border-top: 1px solid rgba(255,255,255,0.12);
    }
    .col { text-align: left; animation: rise 0.9s cubic-bezier(0.16,1,0.3,1) both; }
    .col:nth-child(1){animation-delay:.36s} .col:nth-child(2){animation-delay:.48s}
    .col h3 { font-size: clamp(13px,1.1vw,17px); font-weight: 800; letter-spacing: 0.04em; margin: 0 0 8px; }
    .col.gov h3 { color: var(--accent-soft); }
    .col.ant h3 { color: #fff; }
    .col p { font-size: clamp(13px,1.08vw,17px); line-height: 1.55; color: #b6c2d0; margin: 0; }
    .col p b { color: #fff; font-weight: 600; }

    @media (max-aspect-ratio: 1/1) {
      .stage { justify-content: flex-start; overflow-y: auto; padding-top: clamp(30px,5vh,54px); padding-bottom: clamp(90px,13vh,120px); }
      .cols { grid-template-columns: 1fr; max-width: 600px; }
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="head">
      <div class="eyebrow"><span class="num" id="num"></span><span id="eyebrow"></span></div>
      <h1 class="title" id="title"></h1>
      <p class="lead" id="lead"></p>
    </div>

    <div class="models">
      <div class="model"><div class="lock">🔒</div><div class="mt"><div class="k" id="k1"></div><div class="n">Claude Fable 5</div></div></div>
      <div class="model"><div class="lock">🔒</div><div class="mt"><div class="k" id="k2"></div><div class="n">Claude Mythos 5</div></div></div>
    </div>

    <div class="cols">
      <div class="col gov"><h3 id="h-gov"></h3><p id="p-gov"></p></div>
      <div class="col ant"><h3 id="h-ant"></h3><p id="p-ant"></p></div>
    </div>
  </div>

  <div id="nav-dots"></div>
  <a class="nav-arrow" id="nav-prev" href="anthropic-usa-3.html">&#8592;</a>
  <a class="nav-arrow" id="nav-next" href="llm-occidentali.html">&#8594;</a>

  <div id="lang-toggle">
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <script src="js/common.js"></script>
  <script>
    const TXT = {
      it: {
        num: 'Epilogo', eyebrow: 'Export control · Sicurezza nazionale',
        title: 'Claude <span class="hl">vietato</span> agli stranieri',
        lead: 'Il governo americano ordina ad Anthropic di <b>bloccare l\'accesso ai suoi modelli più avanzati a tutti gli utenti stranieri</b> — inclusi i dipendenti non statunitensi dell\'azienda.',
        k1: 'Accesso bloccato', k2: 'Accesso bloccato',
        hGov: 'La motivazione del governo',
        pGov: '<b>Sicurezza nazionale</b> e controllo dell\'export tecnologico, dopo timori legati a possibili <b>vulnerabilità e jailbreak</b> dei modelli.',
        hAnt: 'La replica di Anthropic',
        pAnt: 'Ha <b>obbedito</b>, ma contesta la misura: il governo non avrebbe fornito <b>prove tecniche sufficientemente dettagliate</b>, e i rischi indicati non sarebbero specifici solo dei suoi modelli.'
      },
      en: {
        num: 'Epilogue', eyebrow: 'Export control · National security',
        title: 'Claude <span class="hl">banned</span> for foreigners',
        lead: 'The U.S. government orders Anthropic to <b>block access to its most advanced models for all foreign users</b> — including the company\'s non-U.S. employees.',
        k1: 'Access blocked', k2: 'Access blocked',
        hGov: 'The government\'s rationale',
        pGov: '<b>National security</b> and technology export control, after concerns over possible <b>vulnerabilities and jailbreaks</b> of the models.',
        hAnt: 'Anthropic\'s response',
        pAnt: 'It <b>complied</b>, but contests the measure: the government allegedly provided <b>no sufficiently detailed technical evidence</b>, and the cited risks were not specific to its models alone.'
      }
    };
    function set(id, html){ document.getElementById(id).innerHTML = html; }
    function renderTexts() {
      const t = TXT[lang];
      set('num',t.num); set('eyebrow',t.eyebrow); set('title',t.title); set('lead',t.lead);
      set('k1',t.k1); set('k2',t.k2);
      set('h-gov',t.hGov); set('p-gov',t.pGov); set('h-ant',t.hAnt); set('p-ant',t.pAnt);
    }
    function onLangChange() { renderTexts(); }
    initLangToggle();
    renderTexts();
    initNav();
  </script>
</body>
</html>
