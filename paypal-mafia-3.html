<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PayPal Mafia — Foto — Geopolitica della AI</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    :root { --accent: #06b6d4; --accent-soft: #67e8f9; }
    html, body { background: #000 !important; overflow: hidden; height: 100%; margin: 0; }
    body { font-family: inherit; }

    .stage {
      position: fixed; inset: 0;
      background:
        radial-gradient(70% 60% at 50% 45%, rgba(6,182,212,0.10), transparent 70%),
        #000;
      overflow: hidden;
    }

    /* Foto interamente visibile */
    .photo {
      position: absolute; inset: 0;
      background: url('img/paypal-mafia-photo.webp') no-repeat center center;
      background-size: contain;
      animation: photo-in 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes photo-in {
      from { opacity: 0; transform: scale(1.03); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Sfumatura inferiore per far respirare titolo e autore */
    .fade-bottom {
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to top, #000 0%, rgba(0,0,0,0.92) 12%, rgba(0,0,0,0.55) 26%, rgba(0,0,0,0) 44%);
    }

    /* Titolo + autore in basso */
    .title-bar {
      position: absolute; left: 0; right: 0; bottom: clamp(34px, 6.5vh, 70px);
      text-align: center; z-index: 3;
      padding: 0 6vw;
      animation: rise 1s 0.25s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .eyebrow {
      font-size: clamp(11px, 1vw, 16px);
      font-weight: 700; letter-spacing: 0.32em;
      text-transform: uppercase; color: var(--accent-soft);
      margin-bottom: clamp(10px, 1.6vh, 18px);
    }
    .name {
      font-size: clamp(46px, 6.4vw, 108px);
      font-weight: 900; letter-spacing: -0.03em; line-height: 0.92;
      margin: 0; text-transform: uppercase;
      background: linear-gradient(180deg, #ffffff 28%, #a5f3fc 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      text-shadow: 0 0 70px rgba(6,182,212,0.45);
    }
    .author {
      display: inline-flex; align-items: center; gap: 12px;
      margin-top: clamp(12px, 1.8vh, 20px);
      font-size: clamp(14px, 1.4vw, 22px);
      color: #cbd5e1; font-weight: 300; letter-spacing: 0.01em;
    }
    .author::before, .author::after {
      content: ''; width: clamp(22px, 3vw, 46px); height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .author b { color: #fff; font-weight: 600; font-style: normal; }
  </style>
</head>
<body>

  <div class="stage">
    <div class="photo"></div>
    <div class="fade-bottom"></div>

    <div class="title-bar">
      <div class="eyebrow" id="eyebrow"></div>
      <h1 class="name" id="name"></h1>
      <div class="author" id="author"></div>
    </div>
  </div>

  <div id="nav-dots"></div>
  <a class="nav-arrow" id="nav-prev" href="#">&#8592;</a>
  <a class="nav-arrow" id="nav-next" href="#">&#8594;</a>

  <div id="lang-toggle">
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <script src="js/common.js"></script>
  <script>
    const TXT = {
      it: {
        eyebrow: 'Fortune · Tosca Cafe, San Francisco · 2007',
        name: 'La PayPal Mafia',
        author: 'Fotografia di <b>Robyn Twomey</b>'
      },
      en: {
        eyebrow: 'Fortune · Tosca Cafe, San Francisco · 2007',
        name: 'The PayPal Mafia',
        author: 'Photograph by <b>Robyn Twomey</b>'
      }
    };
    function renderTexts() {
      const t = TXT[lang];
      document.getElementById('eyebrow').textContent = t.eyebrow;
      document.getElementById('name').textContent    = t.name;
      document.getElementById('author').innerHTML    = t.author;
    }
    function onLangChange() { renderTexts(); }

    initLangToggle();
    renderTexts();
    initNav();
  </script>
</body>
</html>
