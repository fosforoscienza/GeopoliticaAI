<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palantír — Geopolitica della AI</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root { --accent: #8b5cf6; --accent-soft: #a78bfa; }
    html, body { background: #03070f !important; overflow: hidden; height: 100%; margin: 0; }
    body { font-family: inherit; }

    .stage {
      position: fixed; inset: 0;
      background:
        radial-gradient(70% 60% at 50% 60%, rgba(139,92,246,0.12), transparent 70%),
        #03070f;
      overflow: hidden;
    }

    /* ---------- Foto interamente visibile (contain) ---------- */
    .photo {
      position: absolute; inset: 0;
      background: url('img/palantir.png') no-repeat center center;
      background-size: contain;
      animation: photo-in 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes photo-in {
      from { opacity: 0; transform: scale(1.03); }
      to   { opacity: 1; transform: scale(1); }
    }
    .photo-glow {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(20% 28% at 50% 58%, rgba(139,92,246,0.24), transparent 60%);
      mix-blend-mode: screen;
      animation: pulse 6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.55} 50%{opacity:1} }

    /* sfumatura inferiore per far respirare il titolo */
    .fade-bottom {
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to top, #03070f 0%, rgba(3,7,15,0.92) 12%, rgba(3,7,15,0.45) 26%, rgba(3,7,15,0) 42%);
    }

    /* ---------- Titolo in basso ---------- */
    .title-bar {
      position: absolute; left: 0; right: 0; bottom: clamp(36px, 7vh, 74px);
      text-align: center; z-index: 3;
      animation: rise 1s 0.25s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .eyebrow {
      font-size: clamp(12px, 1vw, 16px);
      font-weight: 700; letter-spacing: 0.34em;
      text-transform: uppercase; color: var(--accent-soft);
      margin-bottom: clamp(10px, 1.6vh, 18px);
    }
    .name {
      font-size: clamp(58px, 8vw, 132px);
      font-weight: 900; letter-spacing: -0.03em; line-height: 0.9;
      margin: 0; text-transform: uppercase;
      background: linear-gradient(180deg, #ffffff 28%, #c4b5fd 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      text-shadow: 0 0 70px rgba(139,92,246,0.45);
    }
    .subtitle {
      font-size: clamp(15px, 1.6vw, 26px);
      color: #cbd5e1; font-weight: 300; font-style: italic;
      margin-top: clamp(10px, 1.6vh, 18px);
      letter-spacing: 0.01em;
    }

    @media (max-aspect-ratio: 1/1) {
      .photo { background-position: center 38%; }
      .title-bar { bottom: clamp(40px, 9vh, 90px); }
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="photo"></div>
    <div class="photo-glow"></div>
    <div class="fade-bottom"></div>

    <div class="title-bar">
      <div class="eyebrow" id="eyebrow"></div>
      <h1 class="name" id="name"></h1>
      <div class="subtitle" id="subtitle"></div>
    </div>
  </div>

  <div id="nav-dots"></div>
  <a class="nav-arrow" id="nav-prev" href="thiel.html">&#8592;</a>
  <a class="nav-arrow" id="nav-next" href="palantir-intro-2.html">&#8594;</a>

  <div id="lang-toggle">
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <script src="js/common.js"></script>
  <script>
    const TXT = {
      it: {
        eyebrow: 'J.R.R. Tolkien · Le pietre veggenti',
        name: 'Palantír',
        subtitle: 'Le «pietre che vedono lontano» del Signore degli Anelli'
      },
      en: {
        eyebrow: 'J.R.R. Tolkien · The seeing-stones',
        name: 'Palantír',
        subtitle: 'The “stones that see afar” of The Lord of the Rings'
      }
    };
    function renderTexts() {
      const t = TXT[lang];
      document.getElementById('eyebrow').textContent  = t.eyebrow;
      document.getElementById('name').textContent     = t.name;
      document.getElementById('subtitle').textContent = t.subtitle;
    }
    function onLangChange() { renderTexts(); }

    initLangToggle();
    renderTexts();
    initNav();
  </script>
</body>
</html>
